<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:p="http://primefaces.org/ui">

	<p:panel id="painelCadastroPedestreBiometria" header="Biometrias cadastradas"
		styleClass="ui-fluid">
		<div class="form-grid sa-cadastro-grid ui-fluid ui-g">

			<div class="ui-g-12 ui-md-4" style="text-align: center;">
				<p:outputLabel value="#{msgs['label.uc008.imagem.digital']}" />
				<p:spacer height="8" />

				<h:panelGroup rendered="#{cadastroPedestreController.biometria == null}"
					styleClass="sa-biometria-preview sa-biometria-preview--empty">
					<h:outputText value="#{msgs['label.uc008.sem.imagem']}" />
				</h:panelGroup>

				<p:graphicImage value="#{cadastroPedestreController.imagemBiometria}"
					stream="false"
					rendered="#{cadastroPedestreController.imagemBiometria != null}"
					styleClass="sa-biometria-preview" />

				<h:outputText
					rendered="#{cadastroPedestreController.biometria != null}"
					value="#{msgs[cadastroPedestreController.biometria.dedo.toString()]}"
					style="display: block; margin-top: 0.5rem; font-weight: bold;" />
			</div>

			<div class="ui-g-12 ui-md-8">
				<p:dataTable id="biometrias"
					value="#{cadastroPedestreController.entidade.biometrias}"
					var="biometria" paginator="true" rows="5"
					paginatorAlwaysVisible="false" paginatorPosition="bottom"
					emptyMessage="#{msgs['msg.nenhum.item.encontrado.adicionar']}"
					rendered="#{not empty cadastroPedestreController.entidade.biometrias}">

					<p:column headerText="#{msgs['label.uc008.dedos.cadastrados']}"
						style="text-align: center;">
						<h:outputText value="#{msgs[biometria.dedo.toString()]}" />
					</p:column>

					<p:column headerText="#{msgs['alt.acao.visualizar']}"
						style="width: 100px; text-align: center;">
						<p:commandButton icon="pi pi-eye"
							title="#{msgs['alt.acao.visualizar']}"
							action="#{cadastroPedestreController.visualizarDigital(biometria)}"
							process="@this" immediate="true"
							styleClass="ui-button-info ui-button-flat rounded-button" />
					</p:column>

					<p:column headerText="#{msgs['alt.acao.excluir']}"
						style="width: 100px; text-align: center;">
						<p:commandButton icon="pi pi-trash"
							title="#{msgs['alt.acao.excluir']}"
							action="#{cadastroPedestreController.removerBiometria(biometria)}"
							process="@this"
							update="form:cadastroPedestreTab:painelCadastroPedestreBiometria biometrias"
							styleClass="ui-button-danger ui-button-flat rounded-button" />
					</p:column>
				</p:dataTable>
			</div>
		</div>
	</p:panel>

	<style>
.sa-biometria-preview {
	display: inline-block;
	height: 200px;
	width: 150px;
	border: 2px solid var(--sa-accent, #39afc7);
	border-radius: var(--sa-radius, 6px);
	object-fit: cover;
}

.sa-biometria-preview--empty {
	display: inline-flex;
	align-items: center;
	justify-content: center;
	height: 200px;
	width: 150px;
	border: 2px solid var(--sa-accent, #39afc7);
	border-radius: var(--sa-radius, 6px);
	color: var(--sa-text-muted, #666);
	text-align: center;
	padding: 0.5rem;
}
	</style>

</ui:composition>
