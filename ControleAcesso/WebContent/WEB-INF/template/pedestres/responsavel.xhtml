<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:p="http://primefaces.org/ui">

	<p:panel header="#{msgs['label.uc016.responsavel']}" styleClass="ui-fluid">
		<div class="form-grid sa-cadastro-grid ui-fluid ui-g" style="align-items: flex-end;">

			<div class="ui-g-12 ui-md-8 ui-lg-6">
				<p:outputLabel value="#{msgs['label.uc016.responsavel']}" for="responsavelAuto" />
				<div class="ui-inputgroup">
					<p:autoComplete id="responsavelAuto"
						value="#{cadastroPedestreController.responsavel}"
						completeMethod="#{cadastroPedestreController.completeResponsavel}"
						var="p" itemLabel="#{p.nome}" itemValue="#{p}"
						converter="pedestreConverter" forceSelection="true"
						placeholder="Digite nome, CPF ou unidade"
						scrollHeight="250" maxResults="15" minQueryLength="4" delay="600">
						<p:ajax event="itemSelect"
							listener="#{cadastroPedestreController.adicionarResponsavel}"
							update="painelTabelaResponsaveis responsavelAuto" />
						<p:column>
							<h:outputText value="#{p.nome}" style="font-weight: bold;" />
							<br />
							<h:outputText value="#{p.cpf}" style="font-size: 0.85em; color: #666;" />
						</p:column>
					</p:autoComplete>

					<p:commandButton id="buscarResponsavel" icon="pi pi-search"
						update="form:dialogEscolherResponsavel"
						oncomplete="PF('escolherResponsavel').show(); return false;"
						process="@this"
						title="Buscar Responsável Avançado"
						styleClass="sa-btn-label ui-button-flat" />
				</div>
			</div>

			<div class="ui-g-12 ui-md-4 ui-lg-3">
				<p:outputLabel value="&#160;" />
				<p:commandButton id="bindDependencies"
					action="#{cadastroPedestreController.bindDependencies()}"
					value="#{msgs['alt.acao.vincular']}" icon="pi pi-link"
					process="@this, responsavelAuto"
					update="painelTabelaResponsaveis responsavelAuto form:dialogEscolherResponsavel"
					styleClass="sa-btn-label ui-button-success w-full" />
			</div>
		</div>
	</p:panel>

	<p:spacer height="10" />

	<p:outputPanel id="painelTabelaResponsaveis">
		<p:panel header="Responsáveis vinculados" styleClass="ui-fluid">
			<p:dataTable id="tableResponsavel"
				value="#{cadastroPedestreController.responsaveis}" var="responsavel"
				paginator="true" rows="3" paginatorPosition="bottom"
				paginatorAlwaysVisible="false"
				styleClass="sa-table tabela-responsive"
				emptyMessage="#{msgs['msg.nenhum.item.encontrado.adicionar']}">

				<p:column headerText="#{msgs['label.uc008.nome']}">
					<h:outputText id="nomeResponsavel" value="#{responsavel.nome}" />

					<p:commandButton id="ajudaResponsavel" icon="pi pi-info-circle"
						styleClass="ui-button-info ui-button-flat rounded-button"
						style="margin-left: 5px; width: 2rem; height: 2rem;"
						onclick="return false;" />

					<p:tooltip id="dicaMostraDadosResponsavel"
						for="nomeResponsavel ajudaResponsavel" position="bottom">
						<div class="sa-tooltip-grid">
							<span class="sa-tooltip-grid__label">#{msgs['label.uc008.nome']}:</span>
							<span class="sa-tooltip-grid__value">#{responsavel.nome}</span>
							<span class="sa-tooltip-grid__label">#{msgs['label.uc008.dataNascimento']}:</span>
							<h:outputText value="#{responsavel.dataNascimento}" styleClass="sa-tooltip-grid__value">
								<f:convertDateTime pattern="dd/MM/yyyy" />
							</h:outputText>
						</div>
					</p:tooltip>
				</p:column>

				<p:column headerText="#{msgs['alt.acao.excluir']}"
					style="width: 100px; text-align: center;">
					<p:commandButton icon="pi pi-trash"
						title="#{msgs['alt.acao.excluir']}"
						action="#{cadastroPedestreController.removeResponsible(responsavel)}"
						process="@this"
						update="tableResponsavel"
						styleClass="ui-button-danger ui-button-flat rounded-button" />
				</p:column>
			</p:dataTable>
		</p:panel>
	</p:outputPanel>

</ui:composition>
