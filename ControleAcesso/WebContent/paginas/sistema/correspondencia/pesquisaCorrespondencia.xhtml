<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:p="http://primefaces.org/ui">

<body>
	<ui:composition template="/tema/templates/template.xhtml">

		<ui:define name="titulo">
			#{msgs['title.sistema']} | Consulta de Correspondências
		</ui:define>

		<ui:define name="tools">
			<p:toolbar
				styleClass="flex flex-column md:flex-row justify-content-between align-items-start gap-3">

				<p:toolbarGroup align="left"
					styleClass="flex flex-wrap gap-2 justify-start w-full md:w-auto">
					<div class="align-mobile">
						<p:commandButton id="acaoNovo"
							action="#{consultaCorrespondenciaController.novo}"
							icon="pi pi-plus" process="@this" update="@form"
							title="Nova Correspondência"
							styleClass="rounded-button ui-button-success" />

						<p:commandButton id="acaoExportar" icon="pi pi-file-excel"
							ajax="false" title="Exportar para Excel"
							styleClass="rounded-button ui-button-flat">
							<p:dataExporter type="xlsx" target="form:correspondenciaTable"
								fileName="correspondencias" />
						</p:commandButton>
					</div>
				</p:toolbarGroup>

				<p:toolbarGroup align="right"
					styleClass="flex flex-wrap gap-2 justify-start md:justify-end w-full md:w-auto">

					<p:commandButton id="acaoLimpar"
						action="#{consultaCorrespondenciaController.limpar}"
						icon="pi pi-spinner" process="@this" update="@form"
						styleClass="rounded-button ui-button-flat" />

					<p:inputText id="filtro-busca-geral" placeholder="Destinatário..."
						value="#{consultaCorrespondenciaController.parans['destinatario.nome']}"
						style="width:150px; font-size: 11px;"
						onkeypress="if(event.key === 'Enter') { event.preventDefault(); document.getElementById('form:acaoBuscar').click(); }" />

					<div style="display: inline-flex">
						<p:commandButton id="acaoBuscar"
							action="#{consultaCorrespondenciaController.buscar}"
							icon="pi pi-search" 
							process="@form" 
    						update="@form"
							styleClass="rounded-button" />
					</div>

					<p:commandButton id="acaoFiltroAvancado" icon="pi pi-sliders-h"
						title="Filtros Avançados" process="@this"
						update="containerDeFiltro"
						action="#{consultaCorrespondenciaController.toggleFiltroFlag('filtroCorrespondencia-flag')}"
						styleClass="col-desktop-only" />

				</p:toolbarGroup>
			</p:toolbar>
		</ui:define>

		<ui:define name="conteudo">

			<h:panelGroup id="containerDeFiltro" layout="block">
				<h:panelGroup id="filtrosAvancadosWrapper" layout="block"
					rendered="#{consultaCorrespondenciaController.getFiltroFlag('filtroCorrespondencia-flag')}">

					<p:panelGrid columns="4" layout="grid"
						styleClass="ui-fluid filtros-avancados">

						<p:outputLabel for="f-rastreio" value="Cód. Rastreio:" />
						<p:inputText id="f-rastreio"
							value="#{consultaCorrespondenciaController.parans['codigoRastreio']}" />

						<p:outputLabel for="f-tipo" value="Tipo:" />
						<p:selectOneMenu id="f-tipo"
							value="#{consultaCorrespondenciaController.parans['tipo']}">
							<f:selectItem itemLabel="Todos" itemValue="" />
							<f:selectItem itemLabel="Carta" itemValue="CARTA" />
							<f:selectItem itemLabel="Pacote" itemValue="PACOTE" />
							<f:selectItem itemLabel="Documento" itemValue="DOCUMENTO" />
						</p:selectOneMenu>

						<p:outputLabel for="f-retirado" value="Já Retirado?" />
						<p:selectOneMenu id="f-retirado"
							value="#{consultaCorrespondenciaController.parans['confirmaRetirada']}">
							<f:selectItem itemLabel="Todos" itemValue="" />
							<f:selectItem itemLabel="Sim" itemValue="S" />
							<f:selectItem itemLabel="Não" itemValue="N" />
						</p:selectOneMenu>

						<p:outputLabel for="f-data" value="Data Recebimento:" />
						<p:calendar id="f-data"
							value="#{consultaCorrespondenciaController.dataPesquisa}"
							pattern="dd/MM/yyyy" navigator="true" />

					</p:panelGrid>
					<p:separator />
				</h:panelGroup>
			</h:panelGroup>

			<h:panelGrid width="100%" columns="1" headerClass="h-grid-header">
				<f:facet name="header">
					<h:outputText value="Lista de Correspondências" />
				</f:facet>

				<h:panelGroup layout="block"
					rendered="#{not empty consultaCorrespondenciaController.result}">
					<p:dataTable id="correspondenciaTable"
						value="#{consultaCorrespondenciaController.result}" var="item"
						lazy="true" paginator="true" rows="10" paginatorPosition="bottom"
						scrollable="true" scrollHeight="flex"
						styleClass="tabela-moderna tabela-responsive">
						<p:column headerText="Unidade / Destinatário">
							<div class="info-group">
								<div class="avatar-icon">
									<i class="pi pi-box"></i>
								</div>
								<div>
									<span class="primary-text">#{item.destinatario.nome}</span> <span
										class="secondary-text">#ID: #{item.destinatario.id}</span>
								</div>
							</div>
						</p:column>

						<p:column headerText="Volume">
							<div>
								<span class="primary-text">#{item.tipo != null ?
									item.tipo : 'Pacote'}</span> <span class="secondary-text">Rastreio:
									#{item.codigoRastreio != null ? item.codigoRastreio : 'S/N'}</span> <span
									class="secondary-text">#{item.observacao}</span>
							</div>
						</p:column>

						<p:column headerText="Recebimento">
							<div>
								<span class="primary-text"> <h:outputText
										value="#{item.dataRecebimento}">
										<f:convertDateTime pattern="dd/MM/yyyy HH:mm" />
									</h:outputText>
								</span> <span class="secondary-text">Portaria Principal</span>
							</div>
						</p:column>

						<p:column headerText="Situação"
							style="width: 150px; text-align: center;">
							<h:outputText
								value="#{item.confirmaRetirada == 'S' ? 'Retirada' : 'Não Retirada'}"
								styleClass="#{item.confirmaRetirada == 'S' ? 'status-retirado' : 'status-pendente'}" />
						</p:column>

						<p:column headerText="" style="text-align: right; width: 180px;">
							<div class="botoes-acao">
								<p:commandButton icon="pi pi-check" title="Confirmar Retirada"
									rendered="#{item.confirmaRetirada == 'N'}"
									styleClass="rounded-button ui-button-outlined ui-button-secondary" />

								<p:commandButton icon="pi pi-pencil"
									action="#{consultaCorrespondenciaController.editar(item.id)}"
									title="Editar"
									styleClass="rounded-button ui-button-outlined ui-button-secondary" />

								<p:commandButton icon="pi pi-trash" title="Excluir"
									styleClass="rounded-button ui-button-outlined ui-button-secondary">
									<f:setPropertyActionListener value="#{item}"
										target="#{consultaCorrespondenciaController.correspondenciaSelecionada}" />
									<p:ajax oncomplete="PF('confirmarExclusao').show()" />
								</p:commandButton>
							</div>
						</p:column>

					</p:dataTable>
				</h:panelGroup>
			</h:panelGrid>

			<p:confirmDialog widgetVar="confirmarExclusao" header="Confirmar"
				message="Deseja excluir este registro?">
				<p:button value="Não"
					onclick="PF('confirmarExclusao').hide(); return false;" />
				<p:commandButton value="Sim"
					oncomplete="PF('confirmarExclusao').hide();"
					action="#{consultaCorrespondenciaController.excluirCorrespondencia()}"
					process="@this" update="@form" />
			</p:confirmDialog>

			<style>
.filtros-avancados {
	margin-bottom: 15px;
	background: #f9f9f9;
	padding: 10px;
	border-radius: 4px;
}

@media ( max-width : 768px) {
	.col-desktop-only {
		display: none !important;
	}
}

.align-mobile {
	padding-top: 15px;
}

/* Estilos para deixar a tabela com visual de cards horizontais (Imagem de referência) */
.tabela-moderna .ui-datatable-data>tr>td {
	border-width: 0 0 1px 0 !important;
	/* Remove bordas verticais, deixa só a linha de baixo */
	border-color: #e0e0e0 !important;
	padding: 15px 10px !important;
	vertical-align: middle;
	background-color: transparent !important;
}

.tabela-moderna .ui-datatable-header, .tabela-moderna th {
	background: transparent !important;
	border-width: 0 0 2px 0 !important;
	border-color: #d0d0d0 !important;
	color: #555 !important;
	font-weight: 600 !important;
}

/* Agrupamento de textos */
.info-group {
	display: flex;
	align-items: center;
	gap: 15px;
}

.avatar-icon {
	background-color: #f4f4f4;
	border-radius: 50%;
	width: 40px;
	height: 40px;
	display: flex;
	align-items: center;
	justify-content: center;
	color: #666;
	font-size: 1.2rem;
}

.primary-text {
	display: block;
	font-weight: 600;
	color: #333;
	font-size: 14px;
	margin-bottom: 3px;
}

.secondary-text {
	display: block;
	font-size: 12px;
	color: #888;
	line-height: 1.3;
}

/* Cores de Status */
.status-pendente {
	color: #d97706; /* Laranja da imagem de referência */
	font-weight: bold;
}

.status-retirado {
	color: #22c55e; /* Verde padrão */
	font-weight: bold;
}

/* Espaçamento dos botões de ação */
.botoes-acao {
	display: flex;
	justify-content: flex-end;
	gap: 8px;
}

/* Ajustes nos botões outlined para ficarem mais parecidos com a referência */
.botoes-acao .ui-button.ui-button-outlined {
	border-color: #ddd !important;
	color: #555 !important;
}

.botoes-acao .ui-button.ui-button-outlined:hover {
	background-color: #f8f9fa !important;
	border-color: #ccc !important;
}

/* Manter responsividade */
@media ( max-width : 768px ) {
	.col-desktop-only {
		display: none !important;
	}
	.botoes-acao {
		flex-wrap: wrap;
		justify-content: flex-start;
		margin-top: 10px;
	}
	.tabela-moderna .ui-datatable-data>tr>td {
		display: block;
		width: 100%;
		text-align: left !important;
	}
}
</style>
		</ui:define>
	</ui:composition>
</body>
</html>
