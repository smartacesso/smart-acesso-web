<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:p="http://primefaces.org/ui">

<body>
	<f:metadata>
		<f:event type="preRenderView" listener="#{cadastroPedestreController.exibeMensagens}" />
	</f:metadata>

	<ui:composition template="/tema/templates/template.xhtml">

		<ui:define name="titulo">
			#{msgs['title.sistema']} | Autoatendimento
		</ui:define>

		<ui:define name="breadcrumb">
			<a target="_top" href="/#{menuController.appName}/paginas/principal.xhtml"> 
                <h:outputText value="#{msgs['title.principal']}" />
			</a> > 
			<h:outputText value="Autoatendimento" />
		</ui:define>

		<ui:define name="tools">
			<p:toolbar id="painelTools">
				<p:toolbarGroup align="left">
					<h:outputText value="Terminal de Autoatendimento SmartAcesso" style="font-weight:bold; color: #2c3e50; font-size: 1.2rem;" />
				</p:toolbarGroup>
			</p:toolbar>
		</ui:define>

		<ui:define name="conteudo">
			<style type="text/css">
				.totem-wrapper { display: flex; justify-content: center; padding: 20px; }
				.totem-container {
					width: 100%; max-width: 900px; background: #fff; border: 1px solid #ddd;
					border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden;
				}
				.totem-step { display: none; flex-direction: column; align-items: center; padding: 40px; }
				.totem-step.active { display: flex; }
				.totem-h1 { font-size: 2.2rem; color: #333; margin-bottom: 25px; }
				.input-totem {
					width: 80%; font-size: 2.2rem; text-align: center;
					padding: 15px; border: 3px solid #ccc; border-radius: 10px;
					margin-bottom: 20px; outline: none;
				}
				.input-totem:focus { border-color: #3498db; }
				
				/* Teclados */
				.kb-grid { display: grid; gap: 10px; width: 100%; margin-top: 10px; }
				.kb-num { grid-template-columns: repeat(3, 1fr); max-width: 400px; }
				.kb-alpha { grid-template-columns: repeat(7, 1fr); max-width: 800px; }
				.kb-key {
					padding: 20px; font-size: 1.4rem; font-weight: bold;
					background: #fff; border: 1px solid #bbb; border-radius: 8px;
					text-align: center; cursor: pointer; user-select: none;
				}
				.kb-key:active { background: #ddd; transform: translateY(2px); }
				.kb-special { background: #eee; font-size: 1.1rem; }

				.totem-footer {
					display: flex; justify-content: space-between;
					padding: 20px; background: #f9f9f9; border-top: 1px solid #eee;
				}
				.btn-totem {
					padding: 15px 40px; font-size: 1.3rem; border-radius: 8px;
					border: none; cursor: pointer; font-weight: bold; color: white;
				}
				.btn-next { background: #2ecc71; }
				.btn-back { background: #95a5a6; }
				
				/* Toast Notification */
				#totem-toast {
				    position: fixed;
				    top: 20px;
				    left: 50%;
				    transform: translateX(-50%);
				    background: #e74c3c;
				    color: white;
				    padding: 15px 30px;
				    border-radius: 50px;
				    font-size: 1.5rem;
				    font-weight: bold;
				    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
				    display: none;
				    z-index: 9999;
				    animation: fadeInOut 3s forwards;
				}
				
				@keyframes fadeInOut {
				    0% { opacity: 0; top: 0; }
				    15% { opacity: 1; top: 20px; }
				    85% { opacity: 1; top: 20px; }
				    100% { opacity: 0; top: 0; }
				}
				
				.toast-success { background: #2ecc71 !important; }
			</style>

			<h:panelGrid width="100%" columns="1" headerClass="h-grid-header">
				<f:facet name="header">
					<h:outputText value="Bem-vindo(a) ao Autoatendimento" />
				</f:facet>
				
				<h:column>
					<div id="totem-toast"></div>
				
					<div class="totem-wrapper">
						<div class="totem-container">
							
							<p:messages id="mensagensTotem" showDetail="false" closable="true" style="width: 90%; margin: 0 auto;" />

							<h:inputHidden id="cpfHiddenTotem" value="#{cadastroPedestreController.entidade.cpf}" />
							<h:inputHidden id="nomeHiddenTotem" value="#{cadastroPedestreController.entidade.nome}" />
							<h:inputHidden id="empresaHiddenTotem" value="#{cadastroPedestreController.entidade.empresa.id}" />
							<h:inputHidden id="obsHiddenTotem" value="#{cadastroPedestreController.entidade.observacoes}" />
							<h:inputHidden id="fotoHiddenTotem" value="#{cadastroPedestreController.fotoBase64}" />

							<p:remoteCommand name="processarFotoNoJava"
								process="fotoHiddenTotem @this"
								action="#{cadastroPedestreController.capturarFotoAutoatendimento}"
								update="foto-preview-container" />

							<p:remoteCommand name="verificarCpfTotemRC" 
											 process="cpfHiddenTotem @this" 
											 action="#{cadastroPedestreController.verificarCpfTotem}" 
											 oncomplete="tratarRetornoCpf(xhr, status, args)" />

							<p:remoteCommand name="enviarDadosProJava"
								process="cpfHiddenTotem nomeHiddenTotem empresaHiddenTotem obsHiddenTotem fotoHiddenTotem @this"
								action="#{cadastroPedestreController.salvarAutoatendimento}"
								update="mensagensTotem"
								oncomplete="verificarMensagensServidor(xhr, status, args)" />

							<div id="listaDeEmpresasOculta" style="display: none;">
								<ui:repeat
									value="#{cadastroPedestreController.listaEmpresasTotem}"
									var="emp">
									<h:panelGroup rendered="#{emp.id != null}">
										<div class="empresa-data-item" data-id="#{emp.id}"
											data-nome="#{emp.nome}"
											data-liberado="#{emp.autoAtendimentoLiberado != null ? emp.autoAtendimentoLiberado : 'false'}">
										</div>
									</h:panelGroup>
								</ui:repeat>
							</div>

							<div id="step-cpf" class="totem-step active">
								<h1 class="totem-h1">Digite seu CPF</h1>
								<input type="text" id="input-cpf" class="input-totem" readonly="readonly" />
								<div id="kb-cpf" class="kb-grid kb-num"></div>
							</div>

							<div id="step-nome" class="totem-step">
								<h1 class="totem-h1">Digite seu Nome</h1>
								<input type="text" id="input-nome" class="input-totem" readonly="readonly" />
								<div id="kb-nome" class="kb-grid kb-alpha"></div>
							</div>

							<div id="step-empresa" class="totem-step">
								<h1 class="totem-h1">Selecione a Empresa</h1>

								<!-- Grid das empresas (Adicionado min-height para manter o tamanho) -->
								<div id="grid-empresas"
									style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; padding: 10px; min-height: 280px; align-content: start;"></div>

								<!-- Controles de Paginação -->
								<div id="paginacao-empresas"
									style="display: none; justify-content: space-between; width: 100%; padding: 10px; margin-top: 15px;">
									<button type="button" class="btn-totem btn-back"
										id="btn-prev-emp" onclick="mudarPaginaEmpresa(-1)">
										<i class="pi pi-chevron-left"></i> Anterior
									</button>

									<span id="indicador-pagina"
										style="font-size: 1.5rem; font-weight: bold; align-self: center; color: #2c3e50;">Página
										1</span>

									<button type="button" class="btn-totem"
										style="background: #3498db;" id="btn-next-emp"
										onclick="mudarPaginaEmpresa(1)">
										Próxima <i class="pi pi-chevron-right"></i>
									</button>
								</div>
							</div>

							<div id="step-obs" class="totem-step">
								<h1 class="totem-h1">Observações (Opcional)</h1>
								<input type="text" id="input-obs" class="input-totem" readonly="readonly" />
								<div id="kb-obs" class="kb-grid kb-alpha"></div>
							</div>

							<div id="step-foto" class="totem-step">
								<h1 class="totem-h1">Posicione seu rosto para a foto</h1>

								<!-- Trocamos a div simples por h:panelGroup para o JSF conseguir "enxergá-la" -->
								<h:panelGroup id="foto-preview-container" layout="block"
									style="text-align:center; width: 100%;">

									<!-- Bloco de Captura (Só aparece se não tiver foto) -->
									<ui:fragment
										rendered="#{empty cadastroPedestreController.entidade.foto}">
										<div
											style="width: 400px; height: 400px; border-radius: 50%; overflow: hidden; border: 8px solid #3498db; margin: 0 auto; background: #000;">
											<video id="videoTotem" width="400" height="400"
												autoplay="autoplay"
												style="object-fit: cover; transform: scaleX(-1);"></video>
										</div>
										<canvas id="canvasTotem" width="400" height="400"
											style="display:none;"></canvas>
										<button type="button" class="btn-totem"
											style="background: #3498db; margin-top: 25px;"
											onclick="tirarFotoTotem();">CAPTURA FOTO</button>
									</ui:fragment>

									<!-- Bloco de Resultado (Só aparece após capturar e processar no Java) -->
									<ui:fragment
										rendered="#{not empty cadastroPedestreController.entidade.foto}">
										<p:graphicImage
											value="#{cadastroPedestreController.getSreamedContent(cadastroPedestreController.entidade.foto)}"
											stream="false" cache="false"
											style="width: 400px; height: 400px; border-radius: 50%; border: 8px solid #2ecc71;" />
										<div style="margin-top: 20px;">
											<button type="button" class="btn-totem"
												style="background: #e67e22; margin-right: 10px;"
												onclick="refazerFoto();">REFAZER</button>
											<button type="button" class="btn-totem btn-next"
												onclick="proximo();">CONFIRMAR</button>
										</div>
									</ui:fragment>

								</h:panelGroup>
							</div>

							<div class="totem-footer">
								<button type="button" class="btn-totem btn-back" onclick="voltar();">Voltar</button>
								<button type="button" id="btn-next" class="btn-totem btn-next" onclick="proximo();">Continuar</button>
							</div>
							
						</div>
					</div>
				</h:column>
			</h:panelGrid>

			<script type="text/javascript">
			//<![CDATA[
				let etapa = 'CPF';
				let dados = { cpf: '', nome: '', empresaId: '', obs: '' };
				const fluxo = ['CPF', 'NOME', 'EMPRESA', 'OBS', 'FOTO'];
				
				// Variaveis de paginação
				let empresasData = [];
				let paginaAtualEmpresas = 0;
				const itensPorPaginaEmpresas = 6; // Exibe 6 empresas por vez (2 linhas de 3)

				window.onload = function() {
					const numKeys = ['1','2','3','4','5','6','7','8','9','←','0','Limpar'];
					const alphaKeys = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').concat(['Espaço', '←', 'Limpar']);
					
					montarTeclado('kb-cpf', 'input-cpf', numKeys);
					montarTeclado('kb-nome', 'input-nome', alphaKeys);
					montarTeclado('kb-obs', 'input-obs', alphaKeys);
					
					carregarEmpresasDoJsf();
				};

				// 1. Apenas lê as empresas ocultas e guarda no Array
				function carregarEmpresasDoJsf() {
				    const itens = document.querySelectorAll('.empresa-data-item');
				    empresasData = []; // Zera a lista
				    
				    if(itens.length > 0) {
				        itens.forEach(item => {
				            // Conversão segura: remove espaços e transforma em minúsculo antes de comparar
				            let liberadoAttr = String(item.getAttribute('data-liberado')).trim().toLowerCase();
				            
				            empresasData.push({
				                id: item.getAttribute('data-id'),
				                nome: item.getAttribute('data-nome'),
				                liberado: (liberadoAttr === 'true')
				            });
				        });
				        paginaAtualEmpresas = 0; // Volta para a primeira página
				        renderizarPaginaEmpresas();
				    } else {
				        document.getElementById('grid-empresas').innerHTML = "<p>Nenhuma empresa encontrada.</p>";
				        document.getElementById('paginacao-empresas').style.display = 'none';
				    }
				}

				// 2. Renderiza apenas as empresas da página atual
				function renderizarPaginaEmpresas() {
				    const grid = document.getElementById('grid-empresas');
				    grid.innerHTML = ''; // Limpa as empresas exibidas
				    
				    const totalPaginas = Math.ceil(empresasData.length / itensPorPaginaEmpresas);
				    const inicio = paginaAtualEmpresas * itensPorPaginaEmpresas;
				    const fim = inicio + itensPorPaginaEmpresas;
				    const itensPagina = empresasData.slice(inicio, fim); // Corta o array
				    
				    itensPagina.forEach(emp => {
				        let div = document.createElement('div');
				        
				        // CSS Aprimorado: A empresa liberada terá sombra, escala maior e cor mais viva
				        if (emp.liberado) {
				            div.style.cssText = "padding: 25px; border: 3px solid #2ecc71; border-radius: 10px; text-align: center; font-weight: bold; cursor: pointer; background: #eafff5; color: #27ae60; box-shadow: 0 4px 10px rgba(46, 204, 113, 0.4); transform: scale(1.03); transition: all 0.2s ease-in-out;";
				        } else {
				            div.style.cssText = "padding: 25px; border: 1px solid #ddd; border-radius: 10px; text-align: center; font-weight: bold; cursor: not-allowed; background: #f9f9f9; color: #aaa; opacity: 0.6;";
				        }
				        
				        div.innerText = emp.nome;
				        div.onclick = () => { 
				            if (!emp.liberado) {
				                avisar("Esta empresa não permite autoatendimento. Ligue no ramal 95 / 96 para aprovacao");
				            }
				            dados.empresaId = emp.id; 
				            proximo(); 
				        };
				        
				        // Efeito de hover no JavaScript para a empresa liberada
				        if (emp.liberado) {
				            div.onmouseover = () => div.style.transform = "scale(1.05)";
				            div.onmouseout = () => div.style.transform = "scale(1.03)";
				        }
				        
				        grid.appendChild(div);
				    });
				    
				    // Atualiza controles de paginação
				    const controles = document.getElementById('paginacao-empresas');
				    const btnPrev = document.getElementById('btn-prev-emp');
				    const btnNext = document.getElementById('btn-next-emp');
				    const indicador = document.getElementById('indicador-pagina');
				    
				    if (totalPaginas <= 1) {
				        controles.style.display = 'none'; // Esconde a paginação se tiver menos que 6
				    } else {
				        controles.style.display = 'flex';
				        indicador.innerText = `Página ${paginaAtualEmpresas + 1} de ${totalPaginas}`;
				        
				        // Esconde botão "Anterior" se estiver na primeira
				        btnPrev.style.visibility = paginaAtualEmpresas > 0 ? 'visible' : 'hidden';
				        // Esconde botão "Próxima" se estiver na última
				        btnNext.style.visibility = paginaAtualEmpresas < totalPaginas - 1 ? 'visible' : 'hidden';
				    }
				}

				// 3. Função chamada pelos botões Anterior e Próximo
				function mudarPaginaEmpresa(direcao) {
				    const totalPaginas = Math.ceil(empresasData.length / itensPorPaginaEmpresas);
				    const novaPagina = paginaAtualEmpresas + direcao;
				    
				    if (novaPagina >= 0 && novaPagina < totalPaginas) {
				        paginaAtualEmpresas = novaPagina;
				        renderizarPaginaEmpresas();
				    }
				}

				function montarTeclado(id, inputId, teclas) {
				    const container = document.getElementById(id);
				    const input = document.getElementById(inputId);
				    teclas.forEach(t => {
				        let k = document.createElement('div');
				        k.className = 'kb-key' + (t.length > 1 ? ' kb-special' : '');
				        k.innerText = t;
				        k.onclick = () => {
				            let valorAtual = input.value;
				            
				            if (t === '←') {
				                valorAtual = valorAtual.replace(/\D/g, "").slice(0, -1);
				            } else if (t === 'Limpar') {
				                valorAtual = '';
				            } else if (t === 'Espaço') {
				                valorAtual += ' ';
				            } else {
				                // Se for teclado de CPF, removemos a máscara para adicionar o novo número
				                if (id === 'kb-cpf') {
				                    valorAtual = valorAtual.replace(/\D/g, "") + t;
				                } else {
				                    valorAtual += t;
				                }
				            }

				            // Aplica a máscara apenas se for o campo de CPF
				            if (id === 'kb-cpf') {
				                input.value = formatarCPF(valorAtual);
				            } else {
				                input.value = valorAtual;
				            }
				        };
				        container.appendChild(k);
				    });
				}

				function proximo() {
			        if(etapa === 'CPF') {
			            dados.cpf = document.getElementById('input-cpf').value;
			            if(dados.cpf.replace(/\D/g, "").length < 11) return avisar("Informe um CPF válido.");
			            document.querySelector('[id$="cpfHiddenTotem"]').value = dados.cpf;
			            document.getElementById('btn-next').innerText = "A pesquisar...";
			            verificarCpfTotemRC(); 
			            return;
			        } else if(etapa === 'NOME') {
			            dados.nome = document.getElementById('input-nome').value;
			            if(!dados.nome) return avisar("Informe o Nome.");
			            etapa = 'EMPRESA';
			        } else if(etapa === 'EMPRESA') {
			            if(!dados.empresaId) return avisar("Por favor, selecione uma empresa.");
			            etapa = 'OBS';
			        } else if(etapa === 'OBS') {
			            dados.obs = document.getElementById('input-obs').value;
			            etapa = 'FOTO'; // Agora vai para a FOTO antes de finalizar
			        } else if(etapa === 'FOTO') {
			            finalizar(); // Finaliza no último passo
			            return;
			        }
			        render();
			    }

				// Callback acionado pelo JSF ao terminar a verificação do CPF
				function tratarRetornoCpf(xhr, status, args) {
					document.getElementById('btn-next').innerText = "Continuar";
					
					if (args && args.existe && args.visitante) {
						dados.nome = args.nome;
						document.getElementById('input-nome').value = args.nome;
						if(args.idEmpresa) {
							dados.empresaId = args.idEmpresa;
						}
					}else if(args && args.existe && !args.visitante){
						 return avisar("Por favor, apenas visitantes.");
					}else {
						dados.nome = '';
						document.getElementById('input-nome').value = '';
					}
					
					etapa = 'NOME';
					render();
				}

				function voltar() {
					let i = fluxo.indexOf(etapa);
					if(i > 0) { 
						etapa = fluxo[i-1]; 
						render(); 
					} else {
						document.getElementById('input-cpf').value = '';
					}
				}

				function render() {
			        document.querySelectorAll('.totem-step').forEach(s => s.classList.remove('active'));
			        document.getElementById('step-' + etapa.toLowerCase()).classList.add('active');
			        
			        // Exibição dos botões
			        const btnNext = document.getElementById('btn-next');
			        btnNext.style.display = (etapa === 'EMPRESA' || etapa === 'FOTO') ? 'none' : 'block';
			        btnNext.innerText = (etapa === 'OBS') ? 'Ir para Foto' : 'Continuar';

			        // Ligar/Desligar câmera automaticamente
			        if (etapa === 'FOTO') {
			            iniciarCameraTotem();
			        } else {
			            pararCameraTotem();
			        }
			    }

				function finalizar() {
				    let cpfInput = document.querySelector('[id$="cpfHiddenTotem"]');
				    let nomeInput = document.querySelector('[id$="nomeHiddenTotem"]');
				    let empresaInput = document.querySelector('[id$="empresaHiddenTotem"]');
				    let obsInput = document.querySelector('[id$="obsHiddenTotem"]');
				    let fotoInput = document.querySelector('[id$="fotoHiddenTotem"]');

				    if (cpfInput && nomeInput && empresaInput) {
				        cpfInput.value = dados.cpf.replace(/\D/g, "");
				        nomeInput.value = dados.nome;
				        empresaInput.value = dados.empresaId;
				        if (obsInput) obsInput.value = dados.obs;
				        
				        // Dispara o envio final
				        enviarDadosProJava(); 
				        
				        // Reset total para o próximo usuário
				        document.getElementById('input-cpf').value = '';
				        document.getElementById('input-nome').value = '';
				        document.getElementById('input-obs').value = '';
				        if (fotoInput) fotoInput.value = '';
				        
				        dados = { cpf: '', nome: '', empresaId: '', obs: '', foto: '' };
				        etapa = 'CPF';
				        render();
				    }
				}
				
				function formatarCPF(v) {
				    v = v.replace(/\D/g, ""); // Remove tudo o que não é dígito
				    if (v.length > 11) v = v.slice(0, 11); // Limita a 11 caracteres
				    
				    v = v.replace(/(\d{3})(\d)/, "$1.$2");       // Coloca ponto após os 3 primeiros dígitos
				    v = v.replace(/(\d{3})(\d)/, "$1.$2");       // Coloca ponto após os 6 primeiros dígitos
				    v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2"); // Coloca hífen antes dos 2 últimos dígitos
				    return v;
				}
				
				let localStream = null;

				async function iniciarCameraTotem() {
				    try {
				        localStream = await navigator.mediaDevices.getUserMedia({ video: { width: 400, height: 400 } });
				        const video = document.getElementById('videoTotem');
				        if(video) video.srcObject = localStream;
				    } catch (err) {
				        avisar("Câmera não encontrada ou acesso negado.");
				    }
				}

				function tirarFotoTotem() {
				    const video = document.getElementById('videoTotem');
				    const canvas = document.getElementById('canvasTotem');
				    const context = canvas.getContext('2d');
				    
				    // Desenha o frame do vídeo no canvas
				    context.translate(400, 0);
				    context.scale(-1, 1); // Espelha de volta para a foto ficar natural
				    context.drawImage(video, 0, 0, 400, 400);
				    
				    const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
				    document.querySelector('[id$="fotoHiddenTotem"]').value = dataUrl;
				    
				    // Para a câmera e envia para o Java processar (salvar na entidade)
				    pararCameraTotem();
				    processarFotoNoJava();
				}

				function pararCameraTotem() {
				    if (localStream) {
				        localStream.getTracks().forEach(track => track.stop());
				    }
				}

				function refazerFoto() {
				    // Comando para o Java limpar a foto da entidade e atualizar o painel
				    // Você pode criar um remoteCommand para isso ou apenas mudar a etapa no JS
				    document.querySelector('[id$="fotoHiddenTotem"]').value = '';
				    iniciarCameraTotem();
				    // Atualize o h:panelGroup via PrimeFaces se necessário
				}
				
				function avisar(mensagem, tipo = 'error') {
				    const toast = document.getElementById('totem-toast');
				    toast.innerText = mensagem;
				    toast.className = ''; // Limpa classes anteriores
				    toast.style.display = 'block';
				    
				    if (tipo === 'success') toast.classList.add('toast-success');
				    
				    // Reinicia animação removendo e recolocando o elemento se necessário, 
				    // ou apenas escondendo após 3s
				    setTimeout(() => {
				        toast.style.display = 'none';
				    }, 3000);
				}
			//]]>
			
				function verificarMensagensServidor(xhr, status, args) {
				    // Busca se existe alguma mensagem de erro renderizada pelo p:messages
				    const msgElement = document.querySelector('#mensagensTotem .ui-messages-error-detail, #mensagensTotem .ui-messages-info-detail');
				    if (msgElement) {
				        avisar(msgElement.innerText, msgElement.classList.contains('ui-messages-error-detail') ? 'error' : 'success');
				    }
				}
			</script>
			
			
		</ui:define>
		
		

	</ui:composition>
