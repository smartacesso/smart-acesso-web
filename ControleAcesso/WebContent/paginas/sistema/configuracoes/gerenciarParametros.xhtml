<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:p="http://primefaces.org/ui">

<body>

	<ui:composition template="/tema/templates/template.xhtml">

		<ui:define name="titulo">
			#{msgs['title.sistema']} | #{msgs['title.gerenciar.parametros.sistema']}
		</ui:define>
		<ui:define name="pageTitle">
			<h:outputText
						value="#{msgs['title.configuracoes.parametros.sistema']}" />
		</ui:define>
		<ui:define name="pageSubtitle">
			<h:outputText value="#{sessionScope.usuario.cliente.nome}" rendered="#{sessionScope.usuario != null}" />
		</ui:define>


<ui:define name="tools">
			<p:toolbar styleClass="sa-toolbar-wrap">
				<p:toolbarGroup styleClass="sa-toolbar-actions">
					<p:commandButton id="save"
						action="#{gerenciarParametrosController.salvar}"
						value="#{msgs['alt.acao.save']}"
						title="#{msgs['alt.acao.save']}"
						icon="pi pi-check" iconPos="left"
						styleClass="sa-btn-label ui-button-success">
						<p:ajax process="@form" update="@form menuForm" />
					</p:commandButton>
				</p:toolbarGroup>
			</p:toolbar>
		</ui:define>

		<ui:define name="conteudo">

				<p:dataTable id="gerenciarParametrosTable"
					value="#{gerenciarParametrosController.parametrosGerais}"
					var="item" styleClass="tabela-responsive sa-table"
					rowKey="#{item.nome}">

					<p:column headerText="#{msgs['label.uc007.nome']}"
						style="text-align: left; width: 45%;">
						<h:outputText value="#{item.nomeAux}" />
					</p:column>

					<p:column headerText="#{msgs['label.uc007.valor']}"
						style="text-align: left;">

						<p:selectBooleanCheckbox value="#{item.valorAtivo}"
							rendered="#{item.editorBooleano}">
							<p:ajax process="@this" />
						</p:selectBooleanCheckbox>

						<p:spinner value="#{item.valorComoInteiro}" min="-1" max="23"
							rendered="#{item.editorHorarioSoc}">
							<p:ajax process="@this" />
						</p:spinner>

						<h:panelGroup rendered="#{item.editorQtdeDigitosCartao}" layout="block"
							styleClass="sa-field-row">
							<p:spinner value="#{item.valorComoInteiro}" min="1" max="16"
								style="width: 6rem;">
								<p:ajax process="@this" />
							</p:spinner>
						</h:panelGroup>

						<p:spinner value="#{item.valorComoInteiro}" min="1" max="365"
							rendered="#{item.editorDiasValidadeLinkFacial}">
							<p:ajax process="@this" />
						</p:spinner>

						<p:spinner value="#{item.valorComoInteiro}" min="1" max="1440"
							rendered="#{item.editorMinutosQrCodeDinamico}">
							<p:ajax process="@this" />
						</p:spinner>

						<p:spinner value="#{item.valorComoInteiro}" min="1" max="24"
							rendered="#{item.editorHorasCadastroFacialRemoto}">
							<p:ajax process="@this" />
						</p:spinner>

						<p:spinner value="#{item.valorComoInteiro}" min="1" max="60"
							rendered="#{item.editorToleranciaEntradaSaida}">
							<p:ajax process="@this" />
						</p:spinner>

						<h:panelGroup rendered="#{item.editorTextoLocalPadrao}" layout="block"
							styleClass="sa-field-row">
							<p:inputText value="#{item.valor}" style="width: 100%; max-width: 28rem;"
								placeholder="UUID do local padrão">
								<p:ajax process="@this" />
							</p:inputText>
						</h:panelGroup>

						<h:panelGroup rendered="#{item.editorTextoFormato}" layout="block"
							styleClass="sa-field-row">
							<p:inputText value="#{item.valor}" style="width: 100%; max-width: 16rem;"
								placeholder="Ex.: dd/MM/yyyy ou HH:mm">
								<p:ajax process="@this" />
							</p:inputText>
							<p:commandButton type="button" icon="pi pi-info-circle"
								title="#{msgs['msg.uc007.ver.documentacao']}"
								onclick="window.open('https://docs.oracle.com/javase/7/docs/api/java/text/SimpleDateFormat.html'); return false;"
								styleClass="ui-button-info ui-button-flat rounded-button" />
						</h:panelGroup>

						<p:inputText value="#{item.valor}"
							rendered="#{item.editorTextoLargo}" style="width: 100%; max-width: 28rem;">
							<p:ajax process="@this" />
						</p:inputText>

						<p:selectOneMenu value="#{item.valor}"
							rendered="#{item.editorSelectLimiteDigitais}"
							style="min-width: 10rem;">
							<f:selectItem itemLabel="Sem limite" itemValue="Sem limite" />
							<f:selectItem itemLabel="1 digital" itemValue="1" />
							<f:selectItem itemLabel="2 digitais" itemValue="2" />
							<p:ajax process="@this" />
						</p:selectOneMenu>

						<p:selectOneMenu value="#{item.valor}"
							rendered="#{item.editorSelectTipoQrPadrao}"
							style="min-width: 12rem;">
							<f:selectItem itemLabel="Estático" itemValue="ESTATICO" />
							<f:selectItem itemLabel="Dinâmico por tempo"
								itemValue="DINAMICO_TEMPO" />
							<f:selectItem itemLabel="Dinâmico por uso"
								itemValue="DINAMICO_USO" />
							<p:ajax process="@this" />
						</p:selectOneMenu>

						<h:panelGroup rendered="#{item.editorCamposObrigatorios}" layout="block"
							styleClass="sa-field-row" style="margin-top: 0.5rem;">
							<p:selectOneMenu
								value="#{gerenciarParametrosController.campoObrigatorio}"
								style="min-width: 14rem;">
								<f:selectItems
									value="#{gerenciarParametrosController.listaCamposObrigatorios}" />
								<p:ajax process="@this" />
							</p:selectOneMenu>

							<p:commandButton id="addCampoObrigatorio"
								value="#{msgs['alt.acao.adicionar']}"
								action="#{gerenciarParametrosController.adicionaCampoObrigatorio}"
								process="@this" update="@form"
								styleClass="sa-btn-label ui-button-success" />
						</h:panelGroup>

						<p:dataTable id="tableCamposObrigatorios"
							value="#{gerenciarParametrosController.camposObrigatorios}"
							rendered="#{not empty gerenciarParametrosController.camposObrigatorios and item.editorCamposObrigatorios}"
							var="campo" styleClass="sa-table tabela-responsive" style="margin-top: 0.75rem; max-width: 300px;">

							<p:column headerText="#{msgs['label.uc008.campo']}">
								<h:outputText value="#{msgs['label.uc008.'.concat(campo)]}" />
							</p:column>

							<p:column headerText="#{msgs['alt.acao.excluir']}">
								<p:commandButton icon="pi pi-trash"
									title="#{msgs['alt.acao.excluir']}"
									action="#{gerenciarParametrosController.removerCampoObrigatorio(campo)}"
									process="@this"
									update="tableCamposObrigatorios form:gerenciarParametrosTable"
									styleClass="ui-button-danger ui-button-flat rounded-button" />
							</p:column>

						</p:dataTable>
					</p:column>

				</p:dataTable>

		</ui:define>

	</ui:composition>

</body>

</html>
