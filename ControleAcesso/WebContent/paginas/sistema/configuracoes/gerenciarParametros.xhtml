<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:p="http://primefaces.org/ui">

<body>

	<ui:composition template="/tema/templates/template.xhtml">

		<ui:define name="titulo">
			#{msgs['title.sistema']} | #{msgs['title.gerenciar.parametros.sistema']}
		</ui:define>

		<ui:define name="breadcrumb">
			<a target="_top"
				href="/#{menuController.appName}/paginas/principal.xhtml"> <h:outputText
					value="#{msgs['title.principal']}" />
			</a> > <h:outputText
				value="#{msgs['title.gerenciar.parametros.sistema']}" />
		</ui:define>

		<ui:define name="tools">
			<p:toolbar styleClass="sa-toolbar-wrap">
				<p:toolbarGroup styleClass="sa-toolbar-actions">
					<p:commandButton id="save"
						action="#{gerenciarParametrosController.salvar}"
						value="#{msgs['alt.acao.save']}"
						title="#{msgs['alt.acao.save']}"
						icon="pi pi-check" iconPos="left"
						styleClass="sa-btn-label ui-button-success">
						<p:ajax process="@form" update="@form menuForm" />
					</p:commandButton>
				</p:toolbarGroup>
			</p:toolbar>
		</ui:define>

		<ui:define name="conteudo">

			<h:panelGrid width="100%" columns="1" headerClass="h-grid-header">
				<f:facet name="header">
					<h:outputText
						value="#{msgs['title.configuracoes.parametros.sistema']}" />
				</f:facet>

				<p:dataTable id="gerenciarParametrosTable"
					value="#{gerenciarParametrosController.parametrosGerais}"
					var="item" styleClass="tabela-responsive sa-table">

					<p:column headerText="#{msgs['label.uc007.nome']}"
						style="text-align: left">
						<h:outputText id="nome" value="#{item.nomeAux}" />
					</p:column>

					<p:column headerText="#{msgs['label.uc007.valor']}"
						style="text-align: left">
						<p:selectBooleanCheckbox value="#{item.valor}"
							rendered="#{item.valor == 'true' or item.valor == 'false' }">
							<p:ajax process="@this" />
						</p:selectBooleanCheckbox>


						<p:spinner value="#{item.valor}" min="-1" max="23"
							rendered="#{item.nome.contains('SOC')}">
							<p:ajax process="@this" />
						</p:spinner>


						<p:inputNumber value="#{item.valor}" minValue="1" maxValue="16"
							decimalPlaces="0"
							rendered="#{not (item.valor == 'true' or item.valor == 'false'
    or item.nome.contains('Formato')
    or item.nome.startsWith('Campos')
    or item.nome.contains('Comtele')
    or item.nome.startsWith('Limite')
    or item.nome.contains('QR Code: Tipo padrão')
    or item.nome.contains('SOC')
    or item.nome.contains('tolerancia')
    or item.nome.contains('remoto')
    or item.nome.contains('Local'))}">

							<p:ajax process="@this" />
						</p:inputNumber>

						<p:inputNumber value="#{item.valor}" minValue="1" maxValue="60"
							decimalPlaces="0"
							rendered="#{item.valor != 'true' and item.valor != 'false' 
									and item.nome.contains('tolerancia')
									and !item.nome.contains('Local')}">

							<p:ajax process="@this" />
						</p:inputNumber>

						<p:inputNumber value="#{item.valor}" minValue="1" maxValue="24"
							decimalPlaces="0"
							rendered="#{item.valor != 'true' and item.valor != 'false' 
									and item.nome.contains('cadastro facial remoto')
									and !item.nome.contains('Local')}">

							<p:ajax process="@this" />
						</p:inputNumber>

						<p:inputText value="#{item.valor}"
							rendered="#{item.nome.contains('Formato') or item.nome.contains('Local')}">

							<p:ajax process="@this" />
						</p:inputText>

						<p:inputText value="#{item.valor}"
							rendered="#{item.nome.contains('Local')}">

							<p:ajax process="@this" />
						</p:inputText>

						<p:inputText value="#{item.valor}"
							rendered="#{item.nome.contains('Comtele')}" style="width: 400px;">

							<p:ajax process="@this" />
						</p:inputText>

						<p:selectOneMenu value="#{item.valor}"
							rendered="#{item.nome.startsWith('Limite')}">
							<f:selectItem itemLabel="Sem limite" itemValue="Sem limite" />
							<f:selectItem itemLabel="1" itemValue="1" />
							<f:selectItem itemLabel="2" itemValue="2" />
						</p:selectOneMenu>

						<p:selectOneMenu value="#{item.valor}"
							rendered="#{item.nome.contains('QR Code: Tipo padrão')}">
							<f:selectItem itemLabel="Estático" itemValue="ESTATICO" />
							<f:selectItem itemLabel="Dinâmico por tempo"
								itemValue="DINAMICO_TEMPO" />
							<f:selectItem itemLabel="Dinâmico por uso"
								itemValue="DINAMICO_USO" />
						</p:selectOneMenu>

						<p:commandButton id="btnDoc" type="button" icon="pi pi-info-circle"
							title="#{msgs[alt.label.ajuda]}"
							rendered="#{item.nome.contains('Formato')}"
							onclick="window.open('https://docs.oracle.com/javase/7/docs/api/java/text/SimpleDateFormat.html'); return false;"
							styleClass="ui-button-info ui-button-flat rounded-button" />

						<p:tooltip for="btnDoc"
							value="#{msgs['msg.uc007.ver.documentacao']}" />

						<p:selectOneMenu
							value="#{gerenciarParametrosController.campoObrigatorio}"
							rendered="#{item.nome.startsWith('Campos')}"
							style="margin-right: 10px; display: inline-flex; margin-bottom: 5px;">
							<f:selectItems
								value="#{gerenciarParametrosController.listaCamposObrigatorios}" />
							<p:ajax process="@this" />
						</p:selectOneMenu>

						<p:commandButton id="addCampoObrigatorio"
							value="#{msgs['alt.acao.adicionar']}"
							rendered="#{item.nome.startsWith('Campos')}"
							action="#{gerenciarParametrosController.adicionaCampoObrigatorio}"
							process="@this" update="@form">
						</p:commandButton>

						<br />
						<p:dataTable id="tableCamposObrigatorios"
							value="#{gerenciarParametrosController.camposObrigatorios}"
							rendered="#{not empty gerenciarParametrosController.camposObrigatorios and item.nome.startsWith('Campos')}"
							var="campo" style="width: 300px;">

							<p:column headerText="#{msgs['label.uc008.campo']}">
								<h:outputText value="#{msgs['label.uc008.'.concat(campo)]}" />
							</p:column>

							<p:column headerText="#{msgs['alt.acao.excluir']}">
								<p:commandButton icon="pi pi-trash"
									title="#{msgs['alt.acao.excluir']}"
									action="#{gerenciarParametrosController.removerCampoObrigatorio(campo)}"
									process="@this"
									update="tableCamposObrigatorios form:gerenciarParametrosTable"
									styleClass="ui-button-danger ui-button-flat rounded-button" />
							</p:column>

						</p:dataTable>
					</p:column>

				</p:dataTable>
			</h:panelGrid>

		</ui:define>

	</ui:composition>

</body>

</html>
