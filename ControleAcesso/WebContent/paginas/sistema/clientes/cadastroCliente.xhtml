<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:p="http://primefaces.org/ui">

<body>

	<ui:composition template="/tema/templates/template.xhtml">

		<ui:define name="titulo">
			#{msgs['title.sistema']} | #{cadastroClienteController.entidade.id != null 
											? msgs['title.uc001.editar.cliente'] 
											: msgs['title.uc001.cadastro.cliente']}
		</ui:define>
		<ui:define name="pageTitle">
			<h:outputText
						value="#{cadastroClienteController.entidade.id != null 
								? msgs['title.uc001.editar.cliente'] 
								: msgs['title.uc001.cadastro.cliente']}" />
		</ui:define>
		<ui:define name="pageSubtitle">
			<h:outputText value="#{sessionScope.usuario.cliente.nome}" rendered="#{sessionScope.usuario != null}" />
		</ui:define>


<ui:define name="tools">
			<p:toolbar styleClass="sa-toolbar-wrap">
				<p:toolbarGroup styleClass="sa-toolbar-actions">
					<ui:include src="/WEB-INF/template/sa-voltar-lista.xhtml">
						<ui:param name="ctrl" value="#{cadastroClienteController}" />
					</ui:include>
					<p:commandButton id="save"
						action="#{cadastroClienteController.salvar}"
						value="#{msgs['alt.acao.save']}"
						title="#{msgs['alt.acao.save']}"
						icon="pi pi-check" iconPos="left"
						styleClass="sa-btn-label ui-button-success">
						<p:ajax process="@form" update="@form" />
					</p:commandButton>
					<p:commandButton id="editarSenha"
						rendered="#{cadastroClienteController.entidade.id != null}"
						value="#{msgs['alt.acao.alterar.senha']}"
						title="#{msgs['alt.acao.alterar.senha']}"
						icon="pi pi-lock" iconPos="left"
						action="#{cadastroClienteController.buscaDadosUsuario()}"
						styleClass="sa-btn-label ui-button-flat">
						<p:ajax process="@this" update="alteraSenhaDialog"
							oncomplete="PF('alteraSenha').show(); return false;" />
					</p:commandButton>
				</p:toolbarGroup>
			</p:toolbar>
		</ui:define>

		<ui:define name="conteudo">

			<p:dialog id="alteraSenhaDialog" widgetVar="alteraSenha"
				header="#{msgs['header.alterar.dados.login']}" modal="true"
				styleClass="sa-dialog">
				<div class="sa-dialog-form">
					<div class="sa-field">
						<span class="sa-label">Login</span>
						<p:inputText value="#{cadastroClienteController.usuarioLogin}">
							<f:validateRegex pattern="[a-zA-Z0-9]+" />
						</p:inputText>
					</div>
					<div class="sa-field">
						<span class="sa-label">
							<h:outputText value="#{msgs['label.nova.senha']}" />
						</span>
						<p:password id="alteraSenha"
							value="#{cadastroClienteController.usuarioSenha}" feedback="true"
							redisplay="true" promptLabel="Digite sua senha" weakLabel="Fraca"
							goodLabel="Boa" strongLabel="Forte"
							validatorMessage="Senha inválida (fraca)">
							<f:validateRegex
								pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[@$!%*?&amp;])[A-Za-z0-9@$!%*?&amp;]{8,}$" />
						</p:password>
					</div>
				</div>
				<h:outputText
					value="Caso o login editado não exista será criado um novo com os dados passados."
					styleClass="sa-hint-text" />
				<div class="sa-dialog-actions">
					<p:commandButton value="#{msgs['alt.acao.alterar']}"
						action="#{cadastroClienteController.alterarSenhaUsuarioCliente()}"
						process="@form" update="@form"
						styleClass="sa-btn-label ui-button-success"
						oncomplete="PF('alteraSenha').hide();" />
				</div>
			</p:dialog>


			<p:accordionPanel id="cadastroClienteTab" styleClass="sa-accordion" multiple="true" activeIndex="0">
						<p:tab title="Cadastro de unidade">
							<p:panel header="Cadastro de unidade" styleClass="ui-fluid">
								<div class="form-grid sa-cadastro-grid ui-fluid ui-g" id="painelCadastroCliente">
								<div class="ui-g-12 ui-md-6">
									<p:outputLabel value="#{msgs['label.uc001.nome']}" for="nome"
										indicateRequired="true" />
									<p:inputText id="nome"
										value="#{cadastroClienteController.entidade.nome}"
										required="true" />
								</div>

								<div class="ui-g-12 ui-md-6">
									<p:outputLabel value="#{msgs['label.uc001.email']}" for="email" />
									<p:inputText id="email"
										value="#{cadastroClienteController.entidade.email}"
										validator="emailValidator" />
								</div>

								<div class="ui-g-12 ui-md-6">
									<p:outputLabel value="#{msgs['label.uc001.cnpj']}" for="cnpj" />
									<p:inputMask id="cnpj"
										value="#{cadastroClienteController.entidade.cnpj}"
										mask="99.999.999/9999-99"
										converter="cnpjConverter" />
								</div>

								<div class="ui-g-12 ui-md-6">
									<p:outputLabel value="#{msgs['label.uc001.telefone']}"
										for="telefone" />
									<p:inputMask id="telefone"
										value="#{cadastroClienteController.entidade.telefone}"
										mask="(999) 9999-9999" />
								</div>

								<div class="ui-g-12 ui-md-6">
									<p:outputLabel value="#{msgs['label.uc001.celular']}"
										for="celular" />
									<p:inputMask id="celular"
										value="#{cadastroClienteController.entidade.celular}"
										mask="(999) 9 9999-9999" />
								</div>

								<div class="ui-g-12 ui-md-6">
									<p:outputLabel value="#{msgs['label.uc001.contato']}"
										for="contato" />
									<p:inputText id="contato"
										value="#{cadastroClienteController.entidade.contato}" />
								</div>

								<div class="ui-g-12 ui-md-6">
									<p:outputLabel value="#{msgs['label.uc001.status']}"
										for="status" indicateRequired="true" />
									<p:selectOneMenu id="status"
										value="#{cadastroClienteController.entidade.status}"
										required="true">
										<f:selectItems
											value="#{cadastroClienteController.listaStatus}" />
									</p:selectOneMenu>
								</div>

								<div class="ui-g-12 ui-md-6">
									<p:outputLabel
										value="#{msgs['label.uc001.nome.unidade.organizacional']}"
										for="unidadeOrganizacional" />
									<p:inputText id="unidadeOrganizacional"
										value="#{cadastroClienteController.entidade.nomeUnidadeOrganizacional}"
										required="true">
										<f:validateRegex pattern="[a-zA-Z0-9]+" />
									</p:inputText>
								</div>

								<div class="ui-g-12 ui-md-6"
									rendered="#{cadastroClienteController.entidade.id == null}">
									<p:outputLabel value="#{msgs['label.uc001.login']}"
										for="usuarioLogin" indicateRequired="true" />
									<p:inputText id="usuarioLogin"
										value="#{cadastroClienteController.usuarioLogin}"
										required="true">
										<f:validateRegex pattern="[a-zA-Z0-9]+" />
									</p:inputText>
								</div>

								<div class="ui-g-12 ui-md-6"
									rendered="#{cadastroClienteController.entidade.id == null}">
									<p:outputLabel value="#{msgs['label.uc001.senha']}"
										for="senhaLogin" indicateRequired="true" />
									<p:password id="senhaLogin"
										value="#{cadastroClienteController.usuarioSenha}"
										required="true" feedback="true" redisplay="true"
										match="confirmarSenha" promptLabel="Digite sua senha"
										weakLabel="Fraca" goodLabel="Boa" strongLabel="Forte"
										validatorMessage="Senha inválida">
										<f:validateRegex
											pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[@$!%*?&amp;])[A-Za-z0-9@$!%*?&amp;]{8,}$" />
									</p:password>
								</div>

								<div class="ui-g-12 ui-md-6"
									rendered="#{cadastroClienteController.entidade.id == null}">
									<p:outputLabel for="confirmarSenha" value="Confirmar Senha:"
										indicateRequired="true" />
									<p:password id="confirmarSenha"
										value="#{cadastroUsuarioController.confirmarSenha}"
										redisplay="true" required="true" feedback="false"
										validatorMessage="Confirmação obrigatória" />
									<h:outputText
										value="A senha deve conter: mínimo 8 caracteres, com letras maiúsculas, minúsculas, números e caracteres especiais."
										styleClass="sa-hint-text" />
								</div>
								</div>
							</p:panel>
						</p:tab>

						<p:tab title="#{msgs['label.uc001.endereco']}">
							<p:panel header="Cadastro de endereço" styleClass="ui-fluid">
								<div class="form-grid sa-cadastro-grid ui-fluid ui-g" id="painelEnderecoCliente">
								<div class="ui-g-12 ui-md-4">
									<p:outputLabel value="#{msgs['label.uc001.cep']}" for="cep" />
									<p:inputMask id="cep"
										value="#{cadastroClienteController.entidade.endereco.cep}"
										mask="99999-999" />
								</div>

								<div class="ui-g-12 ui-md-8">
									<p:outputLabel value="#{msgs['label.uc001.logradouro']}"
										for="logradouro" />
									<p:inputText id="logradouro"
										value="#{cadastroClienteController.entidade.endereco.logradouro}" />
								</div>

								<div class="ui-g-12 ui-md-4">
									<p:outputLabel value="#{msgs['label.uc001.numero']}"
										for="numero" />
									<p:inputNumber id="numero"
										value="#{cadastroClienteController.entidade.endereco.numero}"
										minValue="0" decimalPlaces="0" />
								</div>

								<div class="ui-g-12 ui-md-8">
									<p:outputLabel value="#{msgs['label.uc001.complemento']}"
										for="complemento" />
									<p:inputText id="complemento"
										value="#{cadastroClienteController.entidade.endereco.complemento}" />
								</div>

								<div class="ui-g-12 ui-md-4">
									<p:outputLabel value="#{msgs['label.uc001.bairro']}"
										for="bairro" />
									<p:inputText id="bairro"
										value="#{cadastroClienteController.entidade.endereco.bairro}" />
								</div>

								<div class="ui-g-12 ui-md-4">
									<p:outputLabel value="#{msgs['label.uc001.cidade']}"
										for="cidade" />
									<p:inputText id="cidade"
										value="#{cadastroClienteController.entidade.endereco.cidade}" />
								</div>

								<div class="ui-g-12 ui-md-4">
									<p:outputLabel value="#{msgs['label.uc001.estado']}"
										for="estado" />
									<p:inputText id="estado"
										value="#{cadastroClienteController.entidade.endereco.estado}" />
								</div>
								</div>
							</p:panel>
						</p:tab>

						<p:tab title="#{msgs['label.uc001.planos']}">

							<h:panelGroup layout="block" id="painelPlanosCliente"
								styleClass="form-grid sa-cadastro-grid ui-fluid ui-g">

								<div class="ui-g-12 ui-md-6">
									<p:outputLabel value="#{msgs['label.uc001.nome.plano']}"
										for="nomePlano" indicateRequired="true" />
									<p:inputText id="nomePlano"
										value="#{cadastroClienteController.plano.nome}" />
								</div>
								<div class="ui-g-12 ui-md-3">
									<p:outputLabel value="#{msgs['label.uc001.status.plano']}"
										for="statusPlanos" indicateRequired="true" />
									<p:selectOneMenu id="statusPlanos"
										value="#{cadastroClienteController.plano.status}">
										<f:selectItems
											value="#{cadastroClienteController.listaStatus}" />
									</p:selectOneMenu>
								</div>
								<div class="ui-g-12 ui-md-3">
									<p:outputLabel value="#{msgs['label.uc001.data.inicio']}"
										for="inicioPlano" indicateRequired="true" />
									<p:calendar id="inicioPlano"
										value="#{cadastroClienteController.plano.inicio}"
										mask="99/99/9999" pattern="dd/MM/yyyy" locale="pt_BR"
										navigator="true" />
								</div>
								<div class="ui-g-12 ui-md-3">
									<p:outputLabel value="#{msgs['label.uc001.data.fim']}"
										for="fimPlano" indicateRequired="true" />
									<p:calendar id="fimPlano"
										value="#{cadastroClienteController.plano.fim}"
										mask="99/99/9999" pattern="dd/MM/yyyy" locale="pt_BR"
										navigator="true" />
								</div>
								<div class="ui-g-12 ui-md-3">
									<p:outputLabel
										value="#{msgs['label.uc001.periodicidade.cobranca']}"
										for="periodicidadeCobrancaPlano" indicateRequired="true" />
									<p:inputText id="periodicidadeCobrancaPlano"
										value="#{cadastroClienteController.plano.periodicidadeCobranca}" />
								</div>
								<div class="ui-g-12 ui-md-2">
									<p:outputLabel value="#{msgs['label.uc001.dia.vencimento']}"
										for="diaVencimentoPlano" indicateRequired="true" />
									<p:inputNumber id="diaVencimentoPlano"
										value="#{cadastroClienteController.plano.diaVencimento}"
										decimalPlaces="0" maxValue="31" minValue="1" />
								</div>
								<div class="ui-g-12 ui-md-2">
									<p:outputLabel value="#{msgs['label.uc001.valor.plano']}"
										for="valorPlano" indicateRequired="true" />
									<p:inputNumber id="valorPlano"
										value="#{cadastroClienteController.plano.valor}"
										symbol="#{menuController.currencySymbol}" decimalSeparator=","
										thousandSeparator="." minValue="0" />
								</div>
								<div class="ui-g-12 ui-md-2">
									<p:outputLabel value="&#160;" />
									<p:commandButton id="adicionar"
										value="#{msgs['alt.acao.adicionar']}"
										action="#{cadastroClienteController.adicionarPlano}"
										update="painelPlanosCliente planos"
										process="painelPlanosCliente"
										styleClass="sa-btn-label ui-button-success w-full" />
								</div>
							</h:panelGroup>

							<br />

							<p:outputPanel id="planos" layout="block" styleClass="sa-card-table">

								<ui:include src="/tema/templates/vazio.xhtml">
									<ui:param name="exibe" value="#{empty cadastroClienteController.listaPlanos}" />
									<ui:param name="exibeAdicionar" value="true" />
								</ui:include>

								<p:dataTable id="tablePlanos"
									value="#{cadastroClienteController.listaPlanos}" var="plano"
									paginator="true" rows="5" paginatorPosition="bottom"
									editable="true" paginatorAlwaysVisible="false"
									styleClass="sa-table tabela-responsive"
									rendered="#{not empty cadastroClienteController.listaPlanos}">

									<p:column headerText="#{msgs['label.uc001.nome.plano']}"
										styleClass="sa-table-col-center">
										<p:cellEditor>
											<f:facet name="output">
												<h:outputText value="#{plano.nome}" />
											</f:facet>

											<f:facet name="input">
												<p:inputText value="#{plano.nome}" />
											</f:facet>
										</p:cellEditor>
									</p:column>

									<p:column headerText="#{msgs['label.uc001.status.plano']}"
										styleClass="sa-table-col-center">
										<p:cellEditor>
											<f:facet name="output">
												<h:outputText value="#{plano.status}" />
											</f:facet>

											<f:facet name="input">
												<p:selectOneMenu value="#{plano.status}" styleClass="w-full">
													<f:selectItems
														value="#{cadastroClienteController.listaStatus}" />
												</p:selectOneMenu>
											</f:facet>
										</p:cellEditor>
									</p:column>

									<p:column headerText="#{msgs['label.uc001.data.inicio']}"
										styleClass="sa-table-col-center">
										<p:cellEditor>
											<f:facet name="output">
												<h:outputText value="#{plano.inicio}">
													<f:convertDateTime pattern="dd/MM/yyyy" />
												</h:outputText>
											</f:facet>

											<f:facet name="input">
												<p:calendar value="#{plano.inicio}" pattern="dd/MM/yyyy"
													locale="pt_BR" mask="99/99/9999" navigator="true" />
											</f:facet>
										</p:cellEditor>

									</p:column>

									<p:column headerText="#{msgs['label.uc001.data.fim']}"
										styleClass="sa-table-col-center">
										<p:cellEditor>
											<f:facet name="output">
												<h:outputText value="#{plano.fim}">
													<f:convertDateTime pattern="dd/MM/yyyy" />
												</h:outputText>
											</f:facet>

											<f:facet name="input">
												<p:calendar value="#{plano.fim}" pattern="dd/MM/yyyy"
													locale="pt_BR" mask="99/99/9999" navigator="true" />
											</f:facet>
										</p:cellEditor>

									</p:column>

									<p:column
										headerText="#{msgs['label.uc001.periodicidade.cobranca']}"
										styleClass="sa-table-col-center">
										<p:cellEditor>
											<f:facet name="output">
												<h:outputText value="#{plano.periodicidadeCobranca}" />
											</f:facet>
											<f:facet name="input">
												<p:inputText value="#{plano.periodicidadeCobranca}" />
											</f:facet>
										</p:cellEditor>

									</p:column>

									<p:column headerText="#{msgs['label.uc001.dia.vencimento']}"
										styleClass="sa-table-col-center">
										<p:cellEditor>
											<f:facet name="output">
												<h:outputText value="#{plano.diaVencimento}" />
											</f:facet>
											<f:facet name="input">
												<p:inputNumber value="#{plano.diaVencimento}"
													decimalPlaces="0" maxValue="31" minValue="1" />
											</f:facet>
										</p:cellEditor>

									</p:column>

									<p:column headerText="#{msgs['label.uc001.valor.plano']}"
										styleClass="sa-table-col-center">
										<p:cellEditor>
											<f:facet name="output">
												<h:outputText value="#{plano.valor}">
													<f:convertNumber type="currency" />
												</h:outputText>
											</f:facet>
											<f:facet name="input">
												<p:inputNumber value="#{plano.valor}"
													symbol="#{menuController.currencySymbol}"
													decimalSeparator="," thousandSeparator="." minValue="0" />
											</f:facet>
										</p:cellEditor>

									</p:column>

									<p:column headerText="#{msgs['alt.acao.editar']}"
										styleClass="sa-table-col-edit">
										<p:rowEditor />
									</p:column>

									<p:column headerText="#{msgs['alt.acao.excluir']}"
										styleClass="sa-table-col-actions">
										<p:commandButton icon="pi pi-trash"
											title="#{msgs['alt.acao.excluir']}"
											action="#{cadastroClienteController.removePlano(plano)}"
											process="@this"
											update="form:cadastroClienteTab:tablePlanos form:cadastroClienteTab:planos"
											styleClass="ui-button-danger ui-button-flat rounded-button" />
									</p:column>

								</p:dataTable>
							</p:outputPanel>

							<br />

						</p:tab>

						<p:tab title="#{msgs['label.uc001.integracao.soc']}">

							<p:panel header="#{msgs['label.uc001.integracao.soc']}" styleClass="ui-fluid">
								<div class="form-grid sa-cadastro-grid ui-fluid ui-g">
								<div class="ui-g-12 ui-md-4">
									<p:outputLabel value="#{msgs['label.uc001.codigo.externo']}"
										for="codigoExterno" />
									<p:inputText id="codigoExterno"
										value="#{cadastroClienteController.entidade.integracaoSoc.codigoExterno}" />
								</div>
								<div class="ui-g-12 ui-md-4">
									<p:outputLabel value="#{msgs['label.uc001.usuario.externo']}"
										for="usuarioSoc" />
									<p:inputText id="usuarioSoc"
										value="#{cadastroClienteController.entidade.integracaoSoc.usuarioSoc}" />
								</div>
								<div class="ui-g-12 ui-md-4">
									<p:outputLabel value="#{msgs['label.uc001.senha.externo']}"
										for="senhaSoc" />
									<p:inputText id="senhaSoc"
										value="#{cadastroClienteController.entidade.integracaoSoc.senhaSoc}" />
								</div>
								</div>
							</p:panel>

						</p:tab>

						<p:tab title="#{msgs['label.uc001.integracao.senior']}">
							<p:panel header="#{msgs['label.uc001.integracao.senior']}" styleClass="ui-fluid">
								<div class="form-grid sa-cadastro-grid ui-fluid ui-g">

								<div class="ui-g-12">
									<p:outputLabel value="#{msgs['label.uc001.url.senior']}" for="urlSenior" />
									<p:inputText id="urlSenior"
										value="#{cadastroClienteController.entidade.integracaoSenior.url}" />
								</div>

								<div class="ui-g-12 ui-md-6">
									<p:outputLabel value="#{msgs['label.uc001.usuario.senior']}" for="usuarioSenior" />
									<p:inputText id="usuarioSenior"
										value="#{cadastroClienteController.entidade.integracaoSenior.usuario}" />
								</div>
								<div class="ui-g-12 ui-md-6">
									<p:outputLabel value="#{msgs['label.uc001.senha.senior']}" for="senhaSenior" />
									<p:password id="senhaSenior"
										value="#{cadastroClienteController.senhaIntegracaoInput}" />
								</div>

								<div class="ui-g-12 ui-md-6">
									<p:outputLabel value="Empresa" for="numEmp" />
									<p:inputText id="numEmp"
										value="#{cadastroClienteController.entidade.integracaoSenior.numEmp}" />
								</div>
