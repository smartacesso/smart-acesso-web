<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:p="http://primefaces.org/ui">

<body>

	<ui:composition template="/tema/templates/template.xhtml">
		<ui:define name="titulo">
            Relatório de Permanência dos Pedestres
        </ui:define>
		<ui:define name="pageTitle">
			<h:outputText value="Relatório de Permanência dos Pedestres" />
		</ui:define>
		<ui:define name="pageSubtitle">
			<h:outputText value="#{sessionScope.usuario.cliente.nome}" rendered="#{sessionScope.usuario != null}" />
		</ui:define>


<ui:define name="tools">
			<p:toolbar styleClass="sa-toolbar-wrap sa-toolbar-report">
				<p:toolbarGroup styleClass="sa-toolbar-actions">
					<p:commandButton id="acaoBuscar"
						action="#{relatorioPermanenciaController.buscar()}"
						value="#{msgs['alt.acao.buscar']}"
						title="#{msgs['alt.acao.buscar']}"
						icon="pi pi-search" iconPos="left"
						styleClass="sa-btn-label">
						<p:ajax process="@form" update="@form" />
					</p:commandButton>
					<p:commandButton id="acaoLimpar"
						action="#{relatorioPermanenciaController.limpar()}"
						value="#{msgs['alt.acao.limpar']}"
						title="#{msgs['alt.acao.limpar']}"
						icon="pi pi-filter" iconPos="left"
						styleClass="sa-btn-label ui-button-flat">
						<p:ajax process="@this" update="@form" />
					</p:commandButton>
					<p:commandButton id="acaoExportar"
						value="#{msgs['alt.acao.exportar']}"
						title="#{msgs['alt.acao.exportar']}"
						icon="pi pi-file-excel" iconPos="left"
						ajax="false"
						styleClass="sa-btn-label ui-button-flat">
						<p:dataExporter type="xlsx" target="form:pedestresTable"
							fileName="pedestres" />
					</p:commandButton>
				</p:toolbarGroup>
				<p:toolbarGroup styleClass="sa-toolbar-filters">
					<h:outputText styleClass="sa-toolbar-total"
						value="Total: #{relatorioPermanenciaController.listaResultados.size()}"
						rendered="#{relatorioPermanenciaController.listaResultados.size() > 0}" />
					<p:inputText id="filtro-nome" placeholder="Filtrar por nome"
						onblur="sincronizarFiltro(this, 'filtro-nome-sync');"
						styleClass="filtro-nome filtro-nome-sync sa-search-input"
						value="#{relatorioPermanenciaController.parans['pedestre.nome']}" />
					<p:calendar id="filtro-data-inicio"
						value="#{relatorioPermanenciaController.parans['data_maior_data']}"
						styleClass="filtro-data-maior-sync"
						pattern="dd/MM/yyyy HH:mm" mask="99/99/9999 99:99"
						navigator="true"
						valueChangeListener="#{relatorioPermanenciaController.alteraDataInicio}">
						<p:ajax event="dateSelect" update="filtro-avancado-dataInicio" />
						<p:ajax event="change" update="filtro-avancado-dataInicio" />
						<f:convertDateTime pattern="dd/MM/yyyy HH:mm" />
					</p:calendar>
					<h:outputText value="até" />
					<p:calendar id="filtro-data-fim"
						value="#{relatorioPermanenciaController.parans['data_menor_data']}"
						styleClass="filtro-data-menor-sync"
						pattern="dd/MM/yyyy HH:mm" mask="99/99/9999 99:99"
						navigator="true"
						valueChangeListener="#{relatorioPermanenciaController.alteraDataFim}">
						<p:ajax event="dateSelect" update="filtro-avancado-dataFim" />
						<p:ajax event="change" update="filtro-avancado-dataFim" />
						<f:convertDateTime pattern="dd/MM/yyyy HH:mm" />
					</p:calendar>
					<p:commandButton id="acaoFiltroAvancado"
						value="Filtros"
						icon="pi pi-sliders-h" iconPos="left"
						title="#{msgs['alt.acao.alternar.filtros.avancados']}"
						process="@this" update="containerDeFiltro"
						action="#{relatorioPermanenciaController.toggleFiltroFlag('relatorio-permanencia-filtroFlag')}"
						styleClass="sa-btn-label ui-button-flat col-desktop-only" />
				</p:toolbarGroup>
			</p:toolbar>
		</ui:define>

		<ui:define name="conteudo">

			<h:panelGroup layout="block"
				styleClass="sa-pesquisa-split #{relatorioPermanenciaController.getFiltroFlag('relatorio-permanencia-filtroFlag') ? 'sa-pesquisa-split--filtros-abertos' : ''}">

				<div class="sa-pesquisa-split__main">

			<h:panelGroup id="containerDeFiltro" layout="block" styleClass="sa-pesquisa-split__filtros">
				<h:panelGroup id="filtrosAvancadosWrapper" layout="block"
					rendered="#{relatorioPermanenciaController.getFiltroFlag('relatorio-permanencia-filtroFlag')}"
					styleClass="filtros-avancados">
					<h3 class="sa-filtros-avancados__title">#{msgs['title.uc008.filtros.avancados']}</h3>
					<div class="form-grid sa-cadastro-grid ui-fluid ui-g">
						<div class="ui-g-12 ui-md-6">
							<p:outputLabel for="filtro-avancado-nome" value="Nome" />
							<p:inputText id="filtro-avancado-nome"
								value="#{relatorioPermanenciaController.parans['pedestre.nome']}"
								onblur="sincronizarFiltro(this, 'filtro-nome-sync');"
								styleClass="filtro-nome-sync" />
						</div>
						<div class="ui-g-12 ui-md-6">
							<p:outputLabel for="filtro-avancado-dataInicio" value="Data inicial" />
							<p:calendar id="filtro-avancado-dataInicio"
								value="#{relatorioPermanenciaController.parans['data_maior_data']}"
								styleClass="filtro-data-maior-sync"
								pattern="dd/MM/yyyy HH:mm" mask="99/99/9999 99:99" navigator="true"
								valueChangeListener="#{relatorioPermanenciaController.alteraDataInicio}">
								<p:ajax event="dateSelect" update="filtro-data-inicio" />
								<p:ajax event="change" update="filtro-data-inicio" />
								<f:convertDateTime pattern="dd/MM/yyyy HH:mm" />
							</p:calendar>
						</div>
						<div class="ui-g-12 ui-md-6">
							<p:outputLabel for="filtro-avancado-dataFim" value="Data final" />
							<p:calendar id="filtro-avancado-dataFim"
								value="#{relatorioPermanenciaController.parans['data_menor_data']}"
								styleClass="filtro-data-menor-sync"
								pattern="dd/MM/yyyy HH:mm" mask="99/99/9999 99:99" navigator="true"
								valueChangeListener="#{relatorioPermanenciaController.alteraDataFim}">
								<p:ajax event="dateSelect" update="filtro-data-fim" />
								<p:ajax event="change" update="filtro-data-fim" />
								<f:convertDateTime pattern="dd/MM/yyyy HH:mm" />
							</p:calendar>
						</div>
					</div>
				</h:panelGroup>
			</h:panelGroup>

			<p:outputPanel id="tabelaPainel" layout="block" styleClass="sa-pesquisa-split__tabela">

				<p:dataTable id="pedestresTable" styleClass="tabela-responsive sa-table"
					value="#{relatorioPermanenciaController.listaResultados}"
					var="pedestre" paginator="true" rows="10"
					paginatorPosition="bottom">

					<p:column headerText="Nome" styleClass="sa-table-col-center">
						<h:outputText value="#{pedestre.nome}" />
					</p:column>

					<p:column styleClass="sa-table-col-center sa-table-col-abbr">
						<f:facet name="header">
							<ui:include src="/tema/templates/sa-th-abbr.xhtml">
								<ui:param name="full" value="Tempo Total no Local" />
								<ui:param name="short" value="Tempo total" />
							</ui:include>
						</f:facet>
						<h:outputText value="#{pedestre.tempoTotalFormatado}" />
					</p:column>

					<p:column styleClass="sa-table-col-center sa-table-col-abbr">
						<f:facet name="header">
							<ui:include src="/tema/templates/sa-th-abbr.xhtml">
								<ui:param name="full" value="Cota Mensal" />
								<ui:param name="short" value="Cota mens." />
							</ui:include>
						</f:facet>
						<h:outputText value="#{pedestre.cotaMensalFormatada}" />
					</p:column>

					<p:column styleClass="sa-table-col-center sa-table-col-abbr">
						<f:facet name="header">
							<ui:include src="/tema/templates/sa-th-abbr.xhtml">
								<ui:param name="full" value="Saldo Restante" />
								<ui:param name="short" value="Saldo" />
							</ui:include>
						</f:facet>
						<h:outputText value="#{pedestre.saldoRestanteFormatado}" />
					</p:column>

				</p:dataTable>

			</p:outputPanel>

				</div>

				<div class="sa-pesquisa-split__footer"></div>

			</h:panelGroup>

		</ui:define>
	</ui:composition>
</body>
</html>
