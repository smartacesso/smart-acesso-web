<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:p="http://primefaces.org/ui">
	
<body>
	
	<ui:composition template="/tema/templates/template.xhtml">
		<ui:define name="titulo">
			#{msgs['title.sistema']} | #{msgs['title.uc010.relatorio.ocupacao']}
		</ui:define>
		<ui:define name="pageTitle">
			<h:outputText value="#{msgs['title.uc010.relatorio.ocupacao']}" />
		</ui:define>
		<ui:define name="pageSubtitle">
			<h:outputText value="#{sessionScope.usuario.cliente.nome}" rendered="#{sessionScope.usuario != null}" />
		</ui:define>


<ui:define name="tools">
			<p:toolbar styleClass="sa-toolbar-wrap sa-toolbar-report">
				<p:toolbarGroup styleClass="sa-toolbar-actions">
					<p:commandButton id="acaoBuscar"
						action="#{relatorioOcupacaoController.buscar()}"
						value="#{msgs['alt.acao.buscar']}"
						title="#{msgs['alt.acao.buscar']}"
						icon="pi pi-search" iconPos="left"
						styleClass="sa-btn-label">
						<p:ajax process="@form" update="@form" />
					</p:commandButton>
					<p:commandButton id="acaoLimpar"
						action="#{relatorioOcupacaoController.limpar()}"
						value="#{msgs['alt.acao.limpar']}"
						title="#{msgs['alt.acao.limpar']}"
						icon="pi pi-filter" iconPos="left"
						styleClass="sa-btn-label ui-button-flat">
						<p:ajax process="@this" update="@form" />
					</p:commandButton>
					<p:commandButton id="acaoExportar"
						value="#{msgs['alt.acao.exportar']}"
						title="#{msgs['alt.acao.exportar']}"
						icon="pi pi-file-excel" iconPos="left"
						ajax="false"
						styleClass="sa-btn-label ui-button-flat">
						<p:dataExporter type="xlsx" target="form:relatorioOcupacaoTab:ocupacaoTable" fileName="relatorioOcupacao" />
					</p:commandButton>
				</p:toolbarGroup>
				<p:toolbarGroup styleClass="sa-toolbar-filters">
					<p:inputText id="filtro-nome" placeholder="Filtrar por nome"
						styleClass="sa-search-input"
						value="#{relatorioOcupacaoController.parans['pedestre.nome']}" />
					<p:calendar id="filtro-data" value="#{relatorioOcupacaoController.dataSelecionada}"
						pattern="dd/MM/yyyy" mask="99/99/9999" navigator="true"
						styleClass="sa-toolbar-filter-calendar" />
					<p:commandButton id="acaoFiltroAvancado"
						value="Filtros"
						icon="pi pi-sliders-h" iconPos="left"
						title="#{msgs['alt.acao.alternar.filtros.avancados']}"
						process="@this" update="containerDeFiltro"
						action="#{relatorioOcupacaoController.toggleFiltroFlag('relatorio-ocupacao-filtroFlag')}"
						styleClass="sa-btn-label ui-button-flat col-desktop-only" />
				</p:toolbarGroup>
			</p:toolbar>
		</ui:define>
		
		<ui:define name="conteudo">

			<h:panelGroup layout="block"
				styleClass="sa-pesquisa-split #{relatorioOcupacaoController.getFiltroFlag('relatorio-ocupacao-filtroFlag') ? 'sa-pesquisa-split--filtros-abertos' : ''}">

				<div class="sa-pesquisa-split__main">

			<h:panelGroup id="containerDeFiltro" layout="block" styleClass="sa-pesquisa-split__filtros">
				<h:panelGroup id="filtrosAvancadosWrapper" layout="block"
					rendered="#{relatorioOcupacaoController.getFiltroFlag('relatorio-ocupacao-filtroFlag')}"
					styleClass="filtros-avancados">
					<h3 class="sa-filtros-avancados__title">#{msgs['title.uc008.filtros.avancados']}</h3>
					<div class="form-grid sa-cadastro-grid ui-fluid ui-g">
						<div class="ui-g-12 ui-md-6">
							<p:outputLabel for="filtro-avancado-nome"
								value="#{msgs['label.uc010.nome']}" />
							<p:inputText id="filtro-avancado-nome"
								value="#{relatorioOcupacaoController.parans['pedestre.nome']}" />
						</div>
						<div class="ui-g-12 ui-md-6">
							<p:outputLabel for="filtro-avancado-equipamento"
								value="#{msgs['label.uc010.equipamento']}" />
							<p:selectOneMenu id="filtro-avancado-equipamento"
								value="#{relatorioOcupacaoController.parans['equipamento']}">
								<f:selectItems value="#{relatorioOcupacaoController.listaEquipamentos}" />
							</p:selectOneMenu>
						</div>
						<div class="ui-g-12 ui-md-6">
							<p:outputLabel for="filtro-avancado-empresa"
								value="#{msgs['label.uc010.empresa']}" />
							<p:selectOneMenu id="filtro-avancado-empresa"
								value="#{relatorioOcupacaoController.parans['pedestre.empresa.id']}">
								<f:selectItems value="#{relatorioOcupacaoController.listaEmpresas}" />
								<f:converter converterId="javax.faces.Long" />
							</p:selectOneMenu>
						</div>
					</div>
				</h:panelGroup>
			</h:panelGroup>
		
			<p:outputPanel id="tabelaPainel" layout="block" styleClass="sa-pesquisa-split__tabela">

			<p:tabView id="relatorioOcupacaoTab" styleClass="sa-tabview">
						<p:tab title="#{msgs['label.uc010.qtde.pedestres.agora']}">
							
							<h:panelGroup layout="block">
								<ui:include src="/tema/templates/vazio.xhtml">
									<ui:param name="exibe" value="#{empty relatorioOcupacaoController.result}" />
									<ui:param name="exibeAdicionar" value="true" />
								</ui:include>
							
								<h:panelGroup layout="block" styleClass="sa-ocupacao-layout"
									rendered="#{not empty relatorioOcupacaoController.result}">
									<div class="sa-ocupacao-layout__table">
										<p:dataTable id="ocupacaoTable" value="#{relatorioOcupacaoController.result}" var="acesso" 
											paginator="true" 
											rows="#{relatorioOcupacaoController.quantPorPagina}" paginatorPosition="bottom"
											paginatorAlwaysVisible="false" styleClass="tabela-responsive sa-table">
												
												<p:column styleClass="sa-table-col-center sa-table-col-abbr" style="width: 60px"
														rendered="#{relatorioOcupacaoController.permiteCampoAdicionalCrachaMatricula}">
													<f:facet name="header">
														<ui:include src="/tema/templates/sa-th-abbr.xhtml">
															<ui:param name="full" value="#{msgs['label.uc010.matricula']}" />
															<ui:param name="short" value="Mat." />
														</ui:include>
													</f:facet>
													<h:outputText value="#{acesso.pedestre.matricula != null ? acesso.pedestre.matricula : '--'}" />
												</p:column>
												
												<p:column styleClass="sa-table-col-center sa-table-col-abbr">
													<f:facet name="header">
														<ui:include src="/tema/templates/sa-th-abbr.xhtml">
															<ui:param name="full" value="#{msgs['label.uc010.numero.cartao.acesso']}" />
															<ui:param name="short" value="Nº cartão" />
														</ui:include>
													</f:facet>
													<h:outputText value="#{acesso.pedestre.codigoCartaoAcesso}" />
												</p:column>
												
												<p:column headerText="#{msgs['label.uc010.nome']}" styleClass="sa-table-col-center">
													<h:outputText value="#{acesso.pedestre.nome}" />
												</p:column>
												
												<p:column headerText="#{msgs['label.uc010.empresa']}" styleClass="sa-table-col-center">
													<h:outputText value="#{acesso.pedestre.empresa.nome}" />
												</p:column>
												
												<p:column styleClass="sa-table-col-center sa-table-col-abbr">
													<f:facet name="header">
														<ui:include src="/tema/templates/sa-th-abbr.xhtml">
															<ui:param name="full" value="#{msgs['label.uc010.data.nascimento']}" />
															<ui:param name="short" value="Dt. nasc." />
														</ui:include>
													</f:facet>
													<h:outputText value="#{acesso.pedestre.dataNascimento}">
														<f:convertDateTime pattern="dd/MM/yyyy"/>
													</h:outputText>
												</p:column>
												
												<p:column styleClass="sa-table-col-center sa-table-col-abbr">
													<f:facet name="header">
														<ui:include src="/tema/templates/sa-th-abbr.xhtml">
															<ui:param name="full" value="#{msgs['label.uc010.data.acesso']}" />
															<ui:param name="short" value="Dt. acesso" />
														</ui:include>
													</f:facet>
													<h:outputText value="#{acesso.data}">
														<f:convertDateTime pattern="dd/MM/yyyy HH:mm:ss"/>
													</h:outputText>
												</p:column>
												
												<p:column styleClass="sa-table-col-center sa-table-col-abbr">
													<f:facet name="header">
														<ui:include src="/tema/templates/sa-th-abbr.xhtml">
															<ui:param name="full" value="#{msgs['label.uc010.equipamento']}" />
															<ui:param name="short" value="Equip." />
														</ui:include>
													</f:facet>
													<h:outputText value="#{acesso.equipamento}" />
												</p:column>
												
												<p:column styleClass="sa-table-col-center sa-table-col-abbr">
													<f:facet name="header">
														<ui:include src="/tema/templates/sa-th-abbr.xhtml">
															<ui:param name="full" value="#{msgs['label.uc010.tipo.acesso']}" />
															<ui:param name="short" value="Tp. acesso" />
														</ui:include>
													</f:facet>
													<h:outputText value="#{acesso.tipo}" />
												</p:column>
												
												<p:column styleClass="sa-table-col-center sa-table-col-abbr">
													<f:facet name="header">
														<ui:include src="/tema/templates/sa-th-abbr.xhtml">
															<ui:param name="full" value="#{msgs['label.uc010.sentido']}" />
															<ui:param name="short" value="Sent." />
														</ui:include>
													</f:facet>
													<h:outputFormat value="#{acesso.sentido}" />
												</p:column>
												
												<p:column styleClass="sa-table-col-actions sa-table-col-abbr" exportable="false">
													<f:facet name="header">
														<ui:include src="/tema/templates/sa-th-abbr.xhtml">
															<ui:param name="full" value="#{msgs['alt.acao.visualizar']}" />
															<ui:param name="short" value="Ver" />
														</ui:include>
													</f:facet>
													<p:commandButton id="acaoVisualizar" icon="pi pi-eye"
														action="#{relatorioOcupacaoController.redirecionaPaginaEditarPedetre(acesso.pedestre.id, 'reOcupacao')}"
														title="#{msgs['alt.acao.visualizar']}"
														styleClass="ui-button-info ui-button-flat rounded-button" />
												</p:column>
												
											</p:dataTable>
									</div>
									
									<h:panelGroup id="qtdePedestres" layout="block" styleClass="sa-ocupacao-layout__stat">
										<div class="sa-ocupacao-stat">
											<span class="sa-ocupacao-stat__value">
												<h:outputText value="#{relatorioOcupacaoController.result.size()}" />
											</span>
											<span class="sa-ocupacao-stat__label">Quantidade de pessoas no momento</span>
										</div>
									</h:panelGroup>
								</h:panelGroup>
							</h:panelGroup>
						</p:tab>
						
						<p:tab title="#{msgs['label.uc010.grafico.ocupacao.hora']}">
							<h:panelGroup layout="block" styleClass="sa-chart-panel">
								<p:chart type="line" model="#{relatorioOcupacaoController.graficoLinha}"/>
							</h:panelGroup>
						</p:tab>
						
					</p:tabView>

			</p:outputPanel>

				</div>

				<div class="sa-pesquisa-split__footer"></div>

			</h:panelGroup>
			
		</ui:define>
	</ui:composition>
</body>
</html>
