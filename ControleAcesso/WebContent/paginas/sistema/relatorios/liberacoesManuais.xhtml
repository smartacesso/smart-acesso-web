<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:p="http://primefaces.org/ui">
	
<body>
	
	<ui:composition template="/tema/templates/template.xhtml">
		<ui:define name="titulo">
			#{msgs['title.sistema']} | #{msgs['title.uc012.liberacoes.manuais']}
		</ui:define>
		<ui:define name="pageTitle">
			<h:outputText value="#{msgs['title.uc012.liberacoes.manuais']}" />
		</ui:define>
		<ui:define name="pageSubtitle">
			<h:outputText value="#{sessionScope.usuario.cliente.nome}" rendered="#{sessionScope.usuario != null}" />
		</ui:define>


<ui:define name="tools">
			<p:toolbar styleClass="sa-toolbar-wrap sa-toolbar-report">
				<p:toolbarGroup styleClass="sa-toolbar-actions">
					<p:commandButton id="acaoBuscar"
						action="#{relatorioLiberacoesManuaisController.buscar()}"
						value="#{msgs['alt.acao.buscar']}"
						title="#{msgs['alt.acao.buscar']}"
						icon="pi pi-search" iconPos="left"
						styleClass="sa-btn-label">
						<p:ajax process="@form" update="@form" />
					</p:commandButton>
					<p:commandButton id="acaoLimpar"
						action="#{relatorioLiberacoesManuaisController.limpar()}"
						value="#{msgs['alt.acao.limpar']}"
						title="#{msgs['alt.acao.limpar']}"
						icon="pi pi-filter" iconPos="left"
						styleClass="sa-btn-label ui-button-flat">
						<p:ajax process="@this" update="@form" />
					</p:commandButton>
					<p:commandButton id="acaoExportar"
						value="#{msgs['alt.acao.exportar']}"
						title="#{msgs['alt.acao.exportar']}"
						icon="pi pi-file-excel" iconPos="left"
						ajax="false"
						styleClass="sa-btn-label ui-button-flat">
						<p:dataExporter type="xlsx" target="form:liberacoesManuaisTable" fileName="liberacoesManuais" />
					</p:commandButton>
				</p:toolbarGroup>
				<p:toolbarGroup styleClass="sa-toolbar-filters">
					<h:outputText styleClass="sa-toolbar-total"
						value="Total: #{relatorioLiberacoesManuaisController.result.size()}"
						rendered="#{relatorioLiberacoesManuaisController.result.size() > 0}" />
					<p:calendar id="filtro-data-inicio"
						value="#{relatorioLiberacoesManuaisController.parans['data_maior_data']}"
						styleClass="filtro-data-maior-sync"
						pattern="dd/MM/yyyy HH:mm" mask="99/99/9999 99:99" navigator="true">
						<p:ajax event="dateSelect" update="filtro-avancado-dataInicio" />
						<p:ajax event="change" update="filtro-avancado-dataInicio" />
						<f:convertDateTime pattern="dd/MM/yyyy HH:mm" />
					</p:calendar>
					<h:outputText value="até" />
					<p:calendar id="filtro-data-fim"
						value="#{relatorioLiberacoesManuaisController.parans['data_menor_data']}"
						styleClass="filtro-data-menor-sync"
						pattern="dd/MM/yyyy HH:mm" mask="99/99/9999 99:99" navigator="true">
						<p:ajax event="dateSelect" update="filtro-avancado-dataFim" />
						<p:ajax event="change" update="filtro-avancado-dataFim" />
						<f:convertDateTime pattern="dd/MM/yyyy HH:mm" />
					</p:calendar>
					<p:commandButton id="acaoFiltroAvancado"
						value="Filtros"
						icon="pi pi-sliders-h" iconPos="left"
						title="#{msgs['alt.acao.alternar.filtros.avancados']}"
						process="@this" update="containerDeFiltro"
						action="#{relatorioLiberacoesManuaisController.toggleFiltroFlag('relatorio-liberacoes-filtroFlag')}"
						styleClass="sa-btn-label ui-button-flat col-desktop-only" />
				</p:toolbarGroup>
			</p:toolbar>
		</ui:define>
		
		<ui:define name="conteudo">

			<h:panelGroup layout="block"
				styleClass="sa-pesquisa-split #{relatorioLiberacoesManuaisController.getFiltroFlag('relatorio-liberacoes-filtroFlag') ? 'sa-pesquisa-split--filtros-abertos' : ''}">

				<div class="sa-pesquisa-split__main">

			<h:panelGroup id="containerDeFiltro" layout="block" styleClass="sa-pesquisa-split__filtros">
				<h:panelGroup id="filtrosAvancadosWrapper" layout="block"
					rendered="#{relatorioLiberacoesManuaisController.getFiltroFlag('relatorio-liberacoes-filtroFlag')}"
					styleClass="filtros-avancados">
					<h3 class="sa-filtros-avancados__title">#{msgs['title.uc008.filtros.avancados']}</h3>
					<div class="form-grid sa-cadastro-grid ui-fluid ui-g">
						<div class="ui-g-12 ui-md-6">
							<p:outputLabel for="filtro-avancado-dataInicio"
								value="#{msgs['title.uc012.data.acesso']}" />
							<p:calendar id="filtro-avancado-dataInicio"
								value="#{relatorioLiberacoesManuaisController.parans['data_maior_data']}"
								styleClass="filtro-data-maior-sync"
								pattern="dd/MM/yyyy HH:mm" mask="99/99/9999 99:99" navigator="true">
								<p:ajax event="dateSelect" update="filtro-data-inicio" />
								<p:ajax event="change" update="filtro-data-inicio" />
								<f:convertDateTime pattern="dd/MM/yyyy HH:mm" />
							</p:calendar>
						</div>
						<div class="ui-g-12 ui-md-6">
							<p:outputLabel for="filtro-avancado-dataFim" value="Data final" />
							<p:calendar id="filtro-avancado-dataFim"
								value="#{relatorioLiberacoesManuaisController.parans['data_menor_data']}"
								styleClass="filtro-data-menor-sync"
								pattern="dd/MM/yyyy HH:mm" mask="99/99/9999 99:99" navigator="true">
								<p:ajax event="dateSelect" update="filtro-data-fim" />
								<p:ajax event="change" update="filtro-data-fim" />
								<f:convertDateTime pattern="dd/MM/yyyy HH:mm" />
							</p:calendar>
						</div>
						<div class="ui-g-12 ui-md-6">
							<p:outputLabel for="filtro-avancado-razao"
								value="#{msgs['title.uc012.razao']}" />
							<p:inputText id="filtro-avancado-razao"
								value="#{relatorioLiberacoesManuaisController.parans['razao']}" />
						</div>
						<div class="ui-g-12 ui-md-6">
							<p:outputLabel for="filtro-avancado-sentido"
								value="#{msgs['title.uc012.sentido']}" />
							<p:inputText id="filtro-avancado-sentido"
								value="#{relatorioLiberacoesManuaisController.parans['sentido']}" />
						</div>
					</div>
				</h:panelGroup>
			</h:panelGroup>
			
			<p:outputPanel id="tabelaPainel" layout="block" styleClass="sa-pesquisa-split__tabela">

			<ui:include src="/tema/templates/vazio.xhtml">
						<ui:param name="exibe" value="#{empty relatorioLiberacoesManuaisController.result}" />
						<ui:param name="exibeAdicionar" value="true" />
					</ui:include>
					
					<p:dataTable id="liberacoesManuaisTable" value="#{relatorioLiberacoesManuaisController.result}" var="acesso" 
						rendered="#{not empty relatorioLiberacoesManuaisController.result}" paginator="true" 
						rows="#{relatorioLiberacoesManuaisController.quantPorPagina}" paginatorPosition="bottom"
						paginatorAlwaysVisible="false" styleClass="tabela-responsive sa-table">
						
						<p:column styleClass="sa-table-col-center sa-table-col-abbr">
							<f:facet name="header">
								<ui:include src="/tema/templates/sa-th-abbr.xhtml">
									<ui:param name="full" value="#{msgs['title.uc012.data.acesso']}" />
									<ui:param name="short" value="Dt. acesso" />
								</ui:include>
							</f:facet>
							<h:outputText value="#{acesso.data}">
								<f:convertDateTime pattern="dd/MM/yyyy HH:mm:ss"/>
							</h:outputText>
						</p:column>
						
						<p:column styleClass="sa-table-col-center sa-table-col-abbr">
							<f:facet name="header">
								<ui:include src="/tema/templates/sa-th-abbr.xhtml">
									<ui:param name="full" value="#{msgs['title.uc012.equipamento']}" />
									<ui:param name="short" value="Equip." />
								</ui:include>
							</f:facet>
							<h:outputText value="#{acesso.equipamento}" />
						</p:column>
						
						<p:column styleClass="sa-table-col-center sa-table-col-abbr">
							<f:facet name="header">
								<ui:include src="/tema/templates/sa-th-abbr.xhtml">
									<ui:param name="full" value="#{msgs['title.uc012.tipo.acesso']}" />
									<ui:param name="short" value="Tp. acesso" />
								</ui:include>
							</f:facet>
							<h:outputText value="#{acesso.tipo}" />
						</p:column>
						
						<p:column headerText="#{msgs['title.uc012.razao']}" styleClass="sa-table-col-center">
							<h:outputText value="#{acesso.razao}" />
						</p:column>
						
						<p:column styleClass="sa-table-col-center sa-table-col-abbr">
							<f:facet name="header">
								<ui:include src="/tema/templates/sa-th-abbr.xhtml">
									<ui:param name="full" value="#{msgs['title.uc012.sentido']}" />
									<ui:param name="short" value="Sent." />
								</ui:include>
							</f:facet>
							<h:outputText value="#{acesso.sentido}" />
						</p:column>
						
					</p:dataTable>

			</p:outputPanel>

				</div>

				<div class="sa-pesquisa-split__footer"></div>

			</h:panelGroup>
		
		</ui:define>
		
	</ui:composition>
</body>
</html>
