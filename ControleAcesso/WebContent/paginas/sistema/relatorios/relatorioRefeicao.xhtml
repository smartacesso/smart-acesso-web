<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:p="http://primefaces.org/ui">

<body>

	<ui:composition template="/tema/templates/template.xhtml">
		<ui:define name="titulo">
			#{msgs['title.sistema']} | Relatório de Refeição
		</ui:define>
		<ui:define name="pageTitle">
			<h:outputText value="Relatório de Refeições" />
		</ui:define>
		<ui:define name="pageSubtitle">
			<h:outputText value="#{sessionScope.usuario.cliente.nome}" rendered="#{sessionScope.usuario != null}" />
		</ui:define>


<ui:define name="tools">
			<p:toolbar styleClass="sa-toolbar-wrap sa-toolbar-report">
				<p:toolbarGroup styleClass="sa-toolbar-actions">
					<p:commandButton id="acaoBuscar"
						action="#{relatorioPedestresController.buscar()}"
						value="#{msgs['alt.acao.buscar']}"
						title="#{msgs['alt.acao.buscar']}"
						icon="pi pi-search" iconPos="left"
						styleClass="sa-btn-label">
						<p:ajax process="@form" update="@form" />
					</p:commandButton>
					<p:commandButton id="acaoLimpar"
						action="#{relatorioPedestresController.limpar()}"
						value="#{msgs['alt.acao.limpar']}"
						title="#{msgs['alt.acao.limpar']}"
						icon="pi pi-filter" iconPos="left"
						styleClass="sa-btn-label ui-button-flat">
						<p:ajax process="@this" update="@form" />
					</p:commandButton>
					<p:commandButton id="acaoExportar"
						value="#{msgs['alt.acao.exportar']}"
						title="#{msgs['alt.acao.exportar']}"
						icon="pi pi-file" iconPos="left"
						ajax="false"
						styleClass="sa-btn-label ui-button-flat">
						<p:dataExporter type="pdf" target="form:pedestresTable"
							fileName="refeicoes" />
					</p:commandButton>
				</p:toolbarGroup>
				<p:toolbarGroup styleClass="sa-toolbar-filters">
					<p:calendar id="filtro-data-inicio"
						value="#{relatorioPedestresController.parans['data_maior_data']}"
						pattern="dd/MM/yyyy HH:mm" mask="99/99/9999 99:99"
						navigator="true"
						valueChangeListener="#{relatorioPedestresController.alteraDataInicio}">
						<p:ajax event="dateSelect" update="filtro-avancado-dataInicio" />
						<p:ajax event="change" update="filtro-avancado-dataInicio" />
						<f:convertDateTime pattern="dd/MM/yyyy HH:mm" />
					</p:calendar>
					<h:outputText value="até" />
					<p:calendar id="filtro-data-fim"
						value="#{relatorioPedestresController.parans['data_menor_data']}"
						pattern="dd/MM/yyyy HH:mm" mask="99/99/9999 99:99"
						navigator="true"
						valueChangeListener="#{relatorioPedestresController.alteraDataFim}">
						<p:ajax event="dateSelect" update="filtro-avancado-dataFim" />
						<p:ajax event="change" update="filtro-avancado-dataFim" />
						<f:convertDateTime pattern="dd/MM/yyyy HH:mm" />
					</p:calendar>
					<p:commandButton id="acaoFiltroAvancado"
						value="Filtros"
						icon="pi pi-sliders-h" iconPos="left"
						title="#{msgs['alt.acao.alternar.filtros.avancados']}"
						process="@this" update="containerDeFiltro"
						action="#{relatorioPedestresController.toggleFiltroFlag('relatorio-refeicao-filtroFlag')}"
						styleClass="sa-btn-label ui-button-flat col-desktop-only" />
				</p:toolbarGroup>
			</p:toolbar>
		</ui:define>

		<ui:define name="conteudo">

			<h:panelGroup layout="block"
				styleClass="sa-pesquisa-split #{relatorioPedestresController.getFiltroFlag('relatorio-refeicao-filtroFlag') ? 'sa-pesquisa-split--filtros-abertos' : ''}">

				<div class="sa-pesquisa-split__main">

			<h:panelGroup id="containerDeFiltro" layout="block" styleClass="sa-pesquisa-split__filtros">
				<h:panelGroup id="filtrosAvancadosWrapper" layout="block"
					rendered="#{relatorioPedestresController.getFiltroFlag('relatorio-refeicao-filtroFlag')}"
					styleClass="filtros-avancados">
					<h3 class="sa-filtros-avancados__title">#{msgs['title.uc008.filtros.avancados']}</h3>
					<div class="form-grid sa-cadastro-grid ui-fluid ui-g">
						<div class="ui-g-12 ui-md-6">
							<p:outputLabel for="filtro-avancado-empresa"
								value="#{msgs['label.uc009.empresa']}" />
							<p:selectOneMenu id="filtro-avancado-empresa"
								value="#{relatorioPedestresController.parans['pedestre.empresa.id']}"
								valueChangeListener="#{relatorioPedestresController.eventoEmpresaSelecionada}">
								<f:selectItems value="#{relatorioPedestresController.listaEmpresas}" />
								<f:converter converterId="javax.faces.Long" />
							</p:selectOneMenu>
						</div>
						<div class="ui-g-12 ui-md-6">
							<p:outputLabel for="filtro-avancado-dataInicio" value="Data inicial" />
							<p:calendar id="filtro-avancado-dataInicio"
								value="#{relatorioPedestresController.parans['data_maior_data']}"
								pattern="dd/MM/yyyy HH:mm" mask="99/99/9999 99:99" navigator="true"
								valueChangeListener="#{relatorioPedestresController.alteraDataInicio}">
								<p:ajax event="dateSelect" update="filtro-data-inicio" />
								<p:ajax event="change" update="filtro-data-inicio" />
								<f:convertDateTime pattern="dd/MM/yyyy HH:mm" />
							</p:calendar>
						</div>
						<div class="ui-g-12 ui-md-6">
							<p:outputLabel for="filtro-avancado-dataFim" value="Data final" />
							<p:calendar id="filtro-avancado-dataFim"
								value="#{relatorioPedestresController.parans['data_menor_data']}"
								pattern="dd/MM/yyyy HH:mm" mask="99/99/9999 99:99" navigator="true"
								valueChangeListener="#{relatorioPedestresController.alteraDataFim}">
								<p:ajax event="dateSelect" update="filtro-data-fim" />
								<p:ajax event="change" update="filtro-data-fim" />
								<f:convertDateTime pattern="dd/MM/yyyy HH:mm" />
							</p:calendar>
						</div>
					</div>
				</h:panelGroup>
			</h:panelGroup>

			<p:outputPanel id="tabelaPainel" layout="block" styleClass="sa-pesquisa-split__tabela">

			<p:panel styleClass="ui-fluid">
						<p:dataTable id="pedestresTable"
							value="#{relatorioPedestresController.refeicoesCount.entrySet()}"
							var="entry" rowHover="true" stripedRows="true"
							styleClass="tabela-responsive sa-table"
							emptyMessage="Nenhuma refeição encontrada no período.">

							<p:column headerText="Refeição" styleClass="sa-table-col-center">
								<h:outputText value="#{entry.key}" />
							</p:column>

							<p:column styleClass="sa-table-col-center sa-table-col-abbr">
								<f:facet name="header">
									<ui:include src="/tema/templates/sa-th-abbr.xhtml">
										<ui:param name="full" value="Quantidade" />
										<ui:param name="short" value="Qtd." />
									</ui:include>
								</f:facet>
								<h:outputText value="#{entry.value}" />
							</p:column>

							<f:facet name="footer">
								<h:outputText escape="false"
									value="Total de refeições: #{relatorioPedestresController.totalRefeicoes} &#10;
               Período: #{relatorioPedestresController.dataInicio} até #{relatorioPedestresController.dataFim} &#10;
               Empresa: #{relatorioPedestresController.empresaSelecionada.getNome()}"
									style="font-weight:bold; text-align:center; display:block; white-space: pre-line;" />
							</f:facet>
						</p:dataTable>
					</p:panel>

			</p:outputPanel>

				</div>

				<div class="sa-pesquisa-split__footer"></div>

			</h:panelGroup>
		</ui:define>
	</ui:composition>
</body>
</html>
