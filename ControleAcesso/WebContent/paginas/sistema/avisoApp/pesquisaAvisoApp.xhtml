<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:p="http://primefaces.org/ui">

<body>
	<f:metadata>
		<f:event type="preRenderView" listener="#{consultaAvisoAppController.exibeMensagens}" />
	</f:metadata>

	<ui:composition template="/tema/templates/template.xhtml">

		<ui:define name="titulo">
			#{msgs['title.sistema']} | Avisos do App
		</ui:define>
		<ui:define name="pageTitle">
			<h:outputText value="Avisos publicados no App" />
		</ui:define>
		<ui:define name="pageSubtitle">
			<h:outputText value="#{sessionScope.usuario.cliente.nome}" rendered="#{sessionScope.usuario != null}" />
		</ui:define>

		<ui:define name="tools">
			<p:toolbar styleClass="sa-toolbar-wrap sa-toolbar-page">
				<p:toolbarGroup styleClass="sa-toolbar-actions sa-toolbar-page__group sa-toolbar-page__group--start">
					<p:commandButton id="acaoNovo"
						action="#{consultaAvisoAppController.novo}"
						value="Novo aviso"
						icon="pi pi-plus" iconPos="left"
						process="@this"
						title="Publicar novo aviso"
						rendered="#{consultaAvisoAppController.podeEditar}"
						styleClass="sa-btn-label ui-button-success" />
					<p:commandButton id="acaoLimpar"
						action="#{consultaAvisoAppController.limpar}"
						value="#{msgs['alt.acao.limpar']}"
						title="#{msgs['alt.acao.limpar']}"
						icon="pi pi-filter" iconPos="left"
						process="@this"
						update="areaPesquisaAviso filtro-busca form:growl"
						styleClass="sa-btn-label ui-button-flat" />
				</p:toolbarGroup>
				<p:toolbarGroup styleClass="sa-toolbar-actions sa-toolbar-page__group sa-toolbar-page__group--end">
					<div class="sa-toolbar-search">
						<p:inputText id="filtro-busca" placeholder="Buscar por título..."
							value="#{consultaAvisoAppController.parans['titulo']}"
							styleClass="sa-search-input" />
						<p:commandButton id="acaoBuscar"
							action="#{consultaAvisoAppController.buscar}"
							value="#{msgs['alt.acao.buscar']}"
							title="#{msgs['alt.acao.buscar']}"
							icon="pi pi-search" iconPos="left"
							process="filtro-busca"
							update="areaPesquisaAviso form:growl"
							styleClass="sa-btn-label" />
					</div>
				</p:toolbarGroup>
			</p:toolbar>
		</ui:define>

		<ui:define name="conteudo">

			<p:outputPanel id="areaPesquisaAviso" layout="block" styleClass="p-col-12">
				<ui:include src="/tema/templates/vazio.xhtml">
					<ui:param name="exibe" value="#{empty consultaAvisoAppController.result}" />
					<ui:param name="exibeAdicionar" value="true" />
				</ui:include>

				<h:panelGroup layout="block" rendered="#{not empty consultaAvisoAppController.result}">
					<p:dataTable id="avisoTable" var="item" value="#{consultaAvisoAppController.result}"
						rows="#{consultaAvisoAppController.quantPorPagina}" paginator="true"
						paginatorPosition="bottom"
						emptyMessage="#{msgs['msg.vazio']}"
						styleClass="tabela-responsive sa-table">

						<p:column headerText="Título" style="min-width: 200px;">
							<span class="sa-cell-primary">#{item.titulo}</span>
							<h:outputText value="#{item.descricao}" styleClass="sa-cell-secondary"
								rendered="#{not empty item.descricao}" />
						</p:column>

						<p:column headerText="Publicação" style="width: 160px; text-align: center;">
							<h:outputText value="#{item.dataPublicacao}">
								<f:convertDateTime pattern="dd/MM/yyyy HH:mm" />
							</h:outputText>
						</p:column>

						<p:column headerText="Imagem" style="width: 90px; text-align: center;">
							<span class="sa-badge #{item.possuiImagem ? 'sa-badge--ok' : 'sa-badge--muted'}">
								#{item.possuiImagem ? 'Sim' : 'Não'}
							</span>
						</p:column>

						<p:column headerText="" style="text-align: right; width: 120px;">
							<div class="sa-table-actions sa-table-actions--end">
								<p:commandButton icon="pi pi-pencil" title="Editar"
									action="#{consultaAvisoAppController.editar(item.id)}"
									process="@this"
									rendered="#{consultaAvisoAppController.podeEditar}"
									styleClass="rounded-button ui-button-outlined ui-button-secondary" />
								<p:commandButton icon="pi pi-trash" title="Excluir"
									process="@this"
									actionListener="#{consultaAvisoAppController.prepararExclusaoAviso}"
									rendered="#{consultaAvisoAppController.podeEditar}"
									styleClass="rounded-button ui-button-outlined ui-button-secondary">
									<f:setPropertyActionListener value="#{item}"
										target="#{consultaAvisoAppController.avisoSelecionado}" />
								</p:commandButton>
							</div>
						</p:column>

					</p:dataTable>
				</h:panelGroup>
			</p:outputPanel>

			<p:confirmDialog widgetVar="confirmarExclusaoAviso" header="Confirmar exclusão"
				message="Deseja remover este aviso? O app deixará de exibi-lo."
				showEffect="fade" hideEffect="fade" styleClass="sa-dialog">
				<div class="sa-dialog-actions">
					<p:button value="Cancelar"
						onclick="PF('confirmarExclusaoAviso').hide(); return false;"
						styleClass="sa-btn-label ui-button-flat" />
					<p:commandButton value="Excluir" icon="pi pi-trash" iconPos="left"
						action="#{consultaAvisoAppController.excluirAviso}"
						process="@this" update="areaPesquisaAviso form:growl"
						oncomplete="PF('confirmarExclusaoAviso').hide()"
						styleClass="sa-btn-label ui-button-danger" />
				</div>
			</p:confirmDialog>

		</ui:define>
	</ui:composition>
</body>
</html>
