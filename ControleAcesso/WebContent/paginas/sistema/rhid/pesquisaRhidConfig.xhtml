<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:p="http://primefaces.org/ui">

<body>
	<f:metadata>
		<f:event type="preRenderView"
			listener="#{consultaRhidConfigController.exibeMensagens}" />
	</f:metadata>

	<ui:composition template="/tema/templates/template.xhtml">

		<ui:define name="titulo">
			#{msgs['title.sistema']} | Integração RHID
		</ui:define>

		<ui:define name="pageTitle">
			<h:outputText value="Integração RHID" />
		</ui:define>

		<ui:define name="pageSubtitle">
			<h:outputText value="#{sessionScope.usuario.cliente.nome}" rendered="#{sessionScope.usuario != null}" />
		</ui:define>

		<ui:define name="tools">
			<p:toolbar styleClass="sa-toolbar-wrap">
				<p:toolbarGroup styleClass="sa-toolbar-actions">
					<p:commandButton id="acaoNovaConfig"
						action="#{consultaRhidConfigController.novo}"
						value="Nova configuração"
						title="Nova configuração"
						icon="pi pi-plus" iconPos="left"
						process="@this"
						styleClass="sa-btn-label ui-button-success" />
					<p:commandButton id="acaoLimpar"
						action="#{consultaRhidConfigController.limpar}"
						value="#{msgs['alt.acao.limpar']}"
						icon="pi pi-filter" iconPos="left"
						process="@this" update="@form"
						title="#{msgs['alt.acao.limpar']}"
						styleClass="sa-btn-label ui-button-flat" />
					<div class="sa-toolbar-search">
						<p:inputText id="filtroEmail"
							placeholder="Buscar por e-mail"
							value="#{consultaRhidConfigController.paramBuscaEmail}"
							styleClass="sa-search-input" />
						<p:commandButton id="acaoBuscar"
							action="#{consultaRhidConfigController.buscar}"
							value="#{msgs['alt.acao.buscar']}"
							icon="pi pi-search" iconPos="left"
							process="@form" update="@form"
							title="#{msgs['alt.acao.buscar']}"
							styleClass="sa-btn-label" />
					</div>
				</p:toolbarGroup>
			</p:toolbar>
		</ui:define>

		<ui:define name="conteudo">

			<p:outputPanel styleClass="p-grid">
				<p:outputPanel styleClass="p-col-12">

					<ui:include src="/tema/templates/vazio.xhtml">
						<ui:param name="exibe"
							value="#{empty consultaRhidConfigController.configuracoesCadastradas}" />
						<ui:param name="exibeAdicionar" value="true" />
					</ui:include>

					<p:dataTable id="tabelaConfigs"
						value="#{consultaRhidConfigController.configuracoesCadastradas}" var="cfg"
						rendered="#{not empty consultaRhidConfigController.configuracoesCadastradas}"
						emptyMessage="Nenhuma configuração cadastrada."
						styleClass="tabela-responsive sa-table">

						<p:column headerText="E-mail" styleClass="sa-table-col-center">
							<h:outputText value="#{cfg.email}" />
						</p:column>

						<p:column headerText="Domínios" styleClass="sa-table-col-center">
							<h:outputText value="#{consultaRhidConfigController.formatarDominios(cfg)}" />
						</p:column>

						<p:column headerText="Última exportação" styleClass="sa-table-col-center">
							<h:outputText value="#{consultaRhidConfigController.formatarUltimaExportacao(cfg.ultimaExportacao)}" />
						</p:column>

						<p:column headerText="Automática" styleClass="sa-table-col-center" style="width: 100px;">
							<h:outputText value="#{cfg.exportacaoAutomatica ? 'Sim' : 'Não'}" />
						</p:column>

						<p:column headerText="#{msgs['alt.acao.editar']}" styleClass="sa-table-col-edit" style="width: 80px;">
							<p:commandButton icon="pi pi-pencil"
								title="#{msgs['alt.acao.editar']}"
								action="#{consultaRhidConfigController.editar(cfg.id)}"
								styleClass="ui-button-info ui-button-flat rounded-button" />
						</p:column>

						<p:column headerText="Importação" styleClass="sa-table-col-actions" style="width: 220px;">
							<h:panelGroup styleClass="sa-table-actions">
								<p:commandButton icon="pi pi-cloud-upload"
									title="Importação completa"
									actionListener="#{consultaRhidConfigController.executarImportacaoCompletaConfig(cfg.id)}"
									styleClass="ui-button-warning ui-button-flat rounded-button"
									process="@this"
									update="@form:painelResultadoImportacao @form:tabelaConfigs"
									disabled="#{consultaRhidConfigController.processando}" />
								<p:commandButton icon="pi pi-sync"
									title="Importação incremental"
									actionListener="#{consultaRhidConfigController.executarImportacaoIncrementalConfig(cfg.id)}"
									styleClass="ui-button-flat rounded-button"
									process="@this"
									update="@form:painelResultadoImportacao @form:tabelaConfigs"
									disabled="#{consultaRhidConfigController.processando}" />
							</h:panelGroup>
						</p:column>

						<p:column headerText="#{msgs['alt.acao.excluir']}" styleClass="sa-table-col-actions" style="width: 80px;">
							<h:panelGroup styleClass="sa-table-actions">
								<p:commandButton icon="pi pi-trash"
									title="#{msgs['alt.acao.excluir']}"
									styleClass="ui-button-danger ui-button-flat rounded-button">
									<f:setPropertyActionListener value="#{cfg.id}"
										target="#{consultaRhidConfigController.configIdParaExclusao}" />
									<p:ajax process="@this" update="@none"
										oncomplete="PF('confirmarExclusaoRhid').show()" />
								</p:commandButton>
							</h:panelGroup>
						</p:column>

					</p:dataTable>

					<p:panel id="painelResultadoImportacao" header="Resultado da última importação"
						styleClass="ui-fluid" style="margin-top: 1.25rem;">
						<h:outputText value="Execute uma importação pela lista acima para ver o detalhamento dos processamentos e erros."
							styleClass="sa-hint-text" style="display: block;"
							rendered="#{consultaRhidConfigController.ultimoResultado == null}" />
						<p:outputPanel rendered="#{consultaRhidConfigController.ultimoResultado != null}">
							<div class="form-grid sa-cadastro-grid ui-fluid ui-g">
								<div class="ui-g-12 ui-md-4">
									<p:outputLabel value="Modo" />
									<h:outputText value="#{consultaRhidConfigController.ultimoResultado.completa ? 'Completa' : 'Incremental'}" />
								</div>
								<div class="ui-g-12 ui-md-2">
									<p:outputLabel value="Processados" />
									<h:outputText value="#{consultaRhidConfigController.ultimoResultado.totalProcessados}" />
								</div>
								<div class="ui-g-12 ui-md-2">
									<p:outputLabel value="Criados" />
									<h:outputText value="#{consultaRhidConfigController.ultimoResultado.totalCriados}" />
								</div>
								<div class="ui-g-12 ui-md-2">
									<p:outputLabel value="Atualizados" />
									<h:outputText value="#{consultaRhidConfigController.ultimoResultado.totalAtualizados}" />
								</div>
								<div class="ui-g-12 ui-md-2">
									<p:outputLabel value="Erros" />
									<h:outputText value="#{consultaRhidConfigController.ultimoResultado.totalErros}" />
								</div>
							</div>
							<p:dataList value="#{consultaRhidConfigController.ultimoResultado.mensagens}" var="msg"
								type="unordered" style="margin-top: 1rem;">
								<h:outputText value="#{msg}" style="display: block; margin-bottom: 0.35rem;" />
							</p:dataList>
						</p:outputPanel>
					</p:panel>

				</p:outputPanel>
			</p:outputPanel>

			<p:confirmDialog id="dialogConfirmarExclusaoRhid"
				widgetVar="confirmarExclusaoRhid"
				header="Confirmar"
				message="Tem certeza que deseja excluir esta configuração RHID?"
				styleClass="sa-dialog">

				<p:button value="Não" onclick="PF('confirmarExclusaoRhid').hide(); return false;"
					styleClass="sa-btn-label ui-button-flat" />
				<p:commandButton value="Sim" oncomplete="PF('confirmarExclusaoRhid').hide();"
					action="#{consultaRhidConfigController.excluirConfiguracaoConfirmada}"
					process="@this" update="@form"
					styleClass="sa-btn-label ui-button-success" />
			</p:confirmDialog>

		</ui:define>

	</ui:composition>

</body>
</html>
