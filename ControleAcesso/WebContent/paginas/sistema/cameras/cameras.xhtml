<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:p="http://primefaces.org/ui">

<body>

	<ui:composition template="/tema/templates/template.xhtml">

		<ui:define name="titulo">
			#{msgs['title.sistema']} | #{msgs['title.uc008.cameras']}
		</ui:define>

		<ui:define name="pageTitle">
			<h:outputText value="#{msgs['title.uc008.cameras']}" />
		</ui:define>

		<ui:define name="pageSubtitle">
			<h:outputText value="#{sessionScope.usuario.cliente.nome}"
				rendered="#{sessionScope.usuario != null}" />
		</ui:define>

		<ui:define name="conteudo">

			<div class="sa-camera-grid">
				<ui:repeat value="#{cameraController.listaCameras}" var="camera">
					<p:panel header="#{camera.devName}" styleClass="sa-camera-card">
						<div class="sa-camera-card__preview">
							<img src="/#{menuController.appName}/#{menuController.path}/tema/img/facial.png"
								alt="#{camera.devName}" />
						</div>
						<p:commandButton value="Liberar"
							action="#{cameraController.liberarCamera(camera)}"
							styleClass="ui-button-success sa-btn-label w-full sa-camera-card__action" />
					</p:panel>
				</ui:repeat>
			</div>

			<h:outputText value="#{msgs['msg.nenhum.item.encontrado']}"
				escape="false" rendered="#{empty cameraController.listaCameras}"
				styleClass="sa-empty-state__text"
				style="display: block; text-align: center; margin-top: 2rem;" />

		</ui:define>

	</ui:composition>

</body>
</html>
