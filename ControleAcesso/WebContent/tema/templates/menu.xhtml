<h:form id="menuForm" xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:c="http://java.sun.com/jsp/jstl/core">

	<p:remoteCommand name="rcAtualizarBadgePendentes"
		action="#{menuController.recarregarMenuPendentesAjax}"
		process="@this"
		update="menuPrincipal"
		global="true" />

	<aside id="saSidebar" class="sa-sidebar-nav" aria-label="Menu principal">

		<div class="sa-sidebar-nav__head">
			<a class="sa-sidebar-nav__logo"
				href="/#{menuController.appName}/#{menuController.path}/paginas/principal.xhtml"
				title="#{msgs['title.principal']}">
				<img src="/#{menuController.appName}/#{menuController.path}/tema/img/logo.png"
					alt="Smart Acesso" />
			</a>
		</div>

		<nav class="sa-sidebar-nav__body">
			<p:panelMenu id="menuPrincipal" model="#{menuController.menu}"
				styleClass="sa-panelmenu" />
		</nav>

		<div class="sa-sidebar-nav__foot">
			<p:panelMenu id="menuUsuarioPanel" model="#{menuController.menuUsuario}"
				styleClass="sa-panelmenu sa-panelmenu--user" />
		</div>

	</aside>

	<!-- Mobile: overlay ao abrir menu -->
	<div class="sa-sidebar-backdrop" onclick="saCloseSidebarMobile()"></div>

</h:form>
