<div class="sa-footer-external"

	xmlns="http://www.w3.org/1999/xhtml"

	xmlns:ui="http://java.sun.com/jsf/facelets"

	xmlns:h="http://java.sun.com/jsf/html"

	xmlns:f="http://java.sun.com/jsf/core"

	xmlns:p="http://primefaces.org/ui">



	<h:panelGroup layout="block"

		styleClass="sa-footer-external__inner #{menuController.mobile ? 'sa-footer-external__inner--mobile' : ''} #{sessionScope.usuario != null ? 'sa-footer-external__inner--app' : ''}">



		<h:panelGroup layout="block" styleClass="sa-footer-external__support sa-footer-external__support--app"

			rendered="#{sessionScope.usuario != null and menuController.mobile == false}">

			<span class="sa-footer-app__label">Suporte:</span>

			<a href="https://api.whatsapp.com/send?phone=5531991094687" target="_blank">WhatsApp (31) 99109-4687</a>

			<span class="sa-footer-app__sep" aria-hidden="true">·</span>

			<a href="https://api.whatsapp.com/send?phone=5531972259259" target="_blank">WhatsApp (31) 97225-9259</a>

		</h:panelGroup>



		<h:panelGroup layout="block" styleClass="sa-footer-external__support"

			rendered="#{sessionScope.usuario == null and menuController.mobile == false}">

			Suporte (ligue ou clique)

			<br/>

			<a href="https://api.whatsapp.com/send?phone=5531991094687" target="_blank">Telefone 1: +55 (31) 99109-4687</a>

			<br/>

			<a href="https://api.whatsapp.com/send?phone=5531972259259" target="_blank">Telefone 2: +55 (31) 97225-9259</a>

		</h:panelGroup>



		<h:panelGroup layout="block" styleClass="sa-footer-external__social"

			rendered="#{sessionScope.usuario == null}">

			<ul class="list-inline social-buttons">

				<li style="display: #{not empty menuController.urlTwitter ? '' : 'none'}">

					<a href="#{menuController.urlTwitter}" target="_blank">

						<i class="fa fa-twitter" style="color: white;"></i>

					</a>

				</li>

				<li style="display: #{not empty menuController.urlFacebook ? '' : 'none'}">

					<a href="#{menuController.urlFacebook}" target="_blank">

						<i class="fa fa-facebook" style="color: white"></i>

					</a>

				</li>

				<li style="display: #{not empty menuController.urlGplus ? '' : 'none'}">

					<a href="#{menuController.urlGplus}" target="_blank">

						<i class="fa fa-google" style="color: white"></i>

					</a>

				</li>

				<li style="display: #{not empty menuController.urlYoutube ? '' : 'none'}">

					<a href="#{menuController.urlYoutube}" target="_blank">

						<i class="fa fa-youtube" style="color: white"></i>

					</a>

				</li>

				<li style="display: #{not empty menuController.urlInstagram ? '' : 'none'}">

					<a href="#{menuController.urlInstagram}" target="_blank">

						<i class="fa fa-instagram" style="color: white"></i>

					</a>

				</li>

				<li style="display: #{not empty menuController.urlBlog ? '' : 'none'}">

					<a href="#{menuController.urlBlog}" target="_blank">

						<i class="fa fa-rss" style="color: white"></i>

					</a>

				</li>

			</ul>

		</h:panelGroup>



		<h:panelGroup layout="block" styleClass="sa-footer-external__copyright">

			<span>Copyright <a target="_blank" href="http://www.smartpontoempresarial.com.br">SmartPonto</a></span>

			<h:panelGroup layout="block" styleClass="sa-footer-external__meta">

				<h:panelGroup rendered="#{sessionScope.usuario != null}">

					<a href="javascript:void(jQuery('.buttonShowVersoes').click());">#{msgs['versao.numero']}</a>

					<span>Tempo de sessão: <span id="timer"></span></span>

				</h:panelGroup>

				<h:outputText value="DESENVOLVIMENTO" styleClass="sa-footer-external__dev-badge"

					rendered="#{menuController.isProdution() == false}" />

			</h:panelGroup>

		</h:panelGroup>



	</h:panelGroup>



</div>
