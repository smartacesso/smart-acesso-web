<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:p="http://primefaces.org/ui">

<body>

	<f:metadata>
		<f:event type="preRenderView" listener="#{loginController.exibeMensagens}" />
	</f:metadata>

	<ui:composition template="tema/templates/template_externo.xhtml">

		<ui:define name="titulo">
			#{msgs['title.sistema']} | Entrar
		</ui:define>

		<ui:define name="conteudo">

			<div class="sa-login sa-login--auth">

				<div class="sa-login__intro">
					<h2>Bem vindo de volta!</h2>
					<p class="text-muted">Entre com sua conta existente e tenha
						todos os seus dados em uma única ferramenta.</p>
				</div>

				<div class="sa-login__card">
					<h3>Preencha seus dados</h3>

					<div class="sa-form-grid">

						<div class="sa-field">
							<span class="sa-label">
								<h:outputText value="#{msgs['label.login.organizacao']}" />
								<h:outputText value="*" styleClass="obrigatorio" />
							</span>
							<p:inputText id="unidadeOrganizacional"
								value="#{loginController.unidadeOrganizacional}"
								label="#{msgs['label.login.organizacao']}"
								required="true" title="" />
						</div>

						<div class="sa-field">
							<span class="sa-label">
								<h:outputText value="#{msgs['login.usuario']}" />
								<h:outputText value="*" styleClass="obrigatorio" />
							</span>
							<p:inputText id="usuario" value="#{loginController.usuario}"
								label="#{msgs['login.usuario']}" required="true" title="" />
						</div>

						<div class="sa-field sa-field--full">
							<span class="sa-label">
								<h:outputText value="#{msgs['login.senha']}" />
								<h:outputText value="*" styleClass="obrigatorio" />
							</span>
							<p:password id="senha" value="#{loginController.senha}"
								label="#{msgs['login.senha']}" maxlength="30" required="true" />
						</div>

						<div class="sa-field sa-field--full sa-login__actions-row">
							<div class="sa-login__actions">
								<p:commandButton id="btLogin"
									value="#{msgs['login.botao']}"
									styleClass="sa-btn-label ui-button-success sa-login__submit"
									action="#{loginController.login()}">
									<p:ajax execute="@all" render="@all" />
								</p:commandButton>
								<a class="sa-link-muted sa-login__forgot" href="javascript:void(PF('esqueciSenha').show());">
									#{msgs['login.esqueci.senha']}
								</a>
							</div>
						</div>

					</div>
				</div>

			</div>

			<p:dialog header="#{msgs['header.login.esqueci.senha']}"
				widgetVar="esqueciSenha" modal="true" styleClass="sa-dialog">

				<div class="sa-dialog-form">
					<div class="sa-field">
						<span class="sa-label">
							<h:outputText value="#{msgs['label.digite.email']}" />
						</span>
						<p:inputText value="#{loginController.email}" styleClass="w-full">
							<p:ajax execute="@this" render="@this" />
						</p:inputText>
					</div>
					<p:commandButton id="btSenha"
						value="#{msgs['label.ok']}"
						styleClass="sa-btn-label ui-button-success w-full"
						action="#{loginController.alterarSenha()}">
						<p:ajax execute="@all" render="@all" />
					</p:commandButton>
				</div>

			</p:dialog>

		</ui:define>

		<ui:define name="script">

		</ui:define>
	</ui:composition>

</body>
</html>
